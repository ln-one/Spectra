services:
  dualweave:
    image: ghcr.io/ln-one/dualweave-service:latest
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - dualweave_data:/var/lib/dualweave/uploads
    environment:
      - DUALWEAVE_ADDR=:8080
      - DUALWEAVE_LOCAL_DIR=/var/lib/dualweave/uploads

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_TIMEOUT_MS=180000
      - NEXT_PUBLIC_CHAT_TIMEOUT_MS=90000
    command: npm run dev
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - AI_REQUEST_TIMEOUT_SECONDS=90
      - CHAT_RAG_TIMEOUT_SECONDS=5
      - OUTLINE_DRAFT_TIMEOUT_SECONDS=90
      - PREVIEW_REBUILD_TIMEOUT_SECONDS=8
      - TOOL_CHECK_CACHE_TTL_SECONDS=300
      - HEALTH_TOOL_TIMEOUT_SECONDS=2
      - GENERATION_TOOLS_REQUIRED=true
      - RQ_WORKER_HEARTBEAT_FRESHNESS_SECONDS=420
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_MODE=persistent
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DOCUMENT_PARSER=${DOCUMENT_PARSER:-auto}
      - LLAMAPARSE_API_KEY=${LLAMAPARSE_API_KEY}
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - DUALWEAVE_ENABLED=true
      - DUALWEAVE_BASE_URL=http://dualweave:8080
      - DB_REQUIRED=true
      - REDIS_REQUIRED=false
      - UVICORN_RELOAD=false
    command: >-
      sh -c "attempt=0;
      until prisma migrate deploy; do
        attempt=$$((attempt+1));
        if [ $$attempt -ge $${PRISMA_MIGRATE_MAX_RETRIES:-20} ]; then
          echo 'prisma migrate deploy failed after retries';
          exit 1;
        fi;
        echo \"prisma migrate deploy failed; retry in $${PRISMA_MIGRATE_RETRY_SECONDS:-3}s ($$attempt/$${PRISMA_MIGRATE_MAX_RETRIES:-20})\";
        sleep $${PRISMA_MIGRATE_RETRY_SECONDS:-3};
      done;
      prisma generate &&
      if [ \"$${UVICORN_RELOAD:-false}\" = \"true\" ]; then
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload;
      else
        uvicorn main:app --host 0.0.0.0 --port 8000;
      fi"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
      dualweave:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - AI_REQUEST_TIMEOUT_SECONDS=90
      - CHAT_RAG_TIMEOUT_SECONDS=5
      - OUTLINE_DRAFT_TIMEOUT_SECONDS=90
      - PREVIEW_REBUILD_TIMEOUT_SECONDS=8
      - TOOL_CHECK_CACHE_TTL_SECONDS=300
      - HEALTH_TOOL_TIMEOUT_SECONDS=2
      - GENERATION_TOOLS_REQUIRED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_MODE=persistent
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DOCUMENT_PARSER=${DOCUMENT_PARSER:-auto}
      - LLAMAPARSE_API_KEY=${LLAMAPARSE_API_KEY}
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - DUALWEAVE_ENABLED=true
      - DUALWEAVE_BASE_URL=http://dualweave:8080
      - WORKER_NAME=worker-1
      - WORKER_RECOVERY_SCAN=true
      - RQ_WORKER_HEARTBEAT_FRESHNESS_SECONDS=420
    command: >-
      sh -c "attempt=0;
      until prisma migrate deploy; do
        attempt=$$((attempt+1));
        if [ $$attempt -ge $${PRISMA_MIGRATE_MAX_RETRIES:-20} ]; then
          echo 'prisma migrate deploy failed after retries';
          exit 1;
        fi;
        echo \"prisma migrate deploy failed; retry in $${PRISMA_MIGRATE_RETRY_SECONDS:-3}s ($$attempt/$${PRISMA_MIGRATE_MAX_RETRIES:-20})\";
        sleep $${PRISMA_MIGRATE_RETRY_SECONDS:-3};
      done;
      prisma generate &&
      python worker.py"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
      dualweave:
        condition: service_started

  chromadb:
    image: chromadb/chroma:0.5.2
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dualweave_data:
  postgres_data:
  redis_data:
  chroma_data:
  runtime_data:
