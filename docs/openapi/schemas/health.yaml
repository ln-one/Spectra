CapabilitiesHealthResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        document_parser:
          $ref: './common.yaml#/CapabilityStatus'
        video_understanding:
          $ref: './common.yaml#/CapabilityStatus'
        speech_recognition:
          $ref: './common.yaml#/CapabilityStatus'
    message:
      type: string

HealthCheckResponse:
  type: object
  required:
    [
      status,
      database,
      redis,
      db_required,
      redis_required,
      service_authorities,
      dependency_timeout_seconds,
      service_authority_timeout_seconds,
      latency_ms,
    ]
  properties:
    status:
      type: string
      enum: [healthy, degraded]
    database:
      type: string
      enum: [connected, disconnected]
    redis:
      type: string
      enum: [connected, disconnected]
    db_required:
      type: boolean
    redis_required:
      type: boolean
    service_authorities:
      type: object
      required: [required, healthy, services, timed_out]
      properties:
        required:
          type: boolean
        healthy:
          type: boolean
        services:
          type: object
          additionalProperties:
            type: object
            required: [configured, env]
            properties:
              configured:
                type: boolean
              env:
                type: string
              base_url:
                type: string
                nullable: true
        timed_out:
          type: boolean
    dependency_timeout_seconds:
      type: number
      format: float
    service_authority_timeout_seconds:
      type: number
      format: float
    latency_ms:
      type: object
      required: [database, redis, service_authorities]
      properties:
        database:
          type: number
          format: float
        redis:
          type: number
          format: float
        service_authorities:
          type: number
          format: float

HealthLivenessResponse:
  type: object
  required: [status]
  properties:
    status:
      type: string
      enum: [alive]
