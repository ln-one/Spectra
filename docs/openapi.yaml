components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 认证令牌
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          example: john_doe
        fullName:
          type: string
          example: John Doe
    UserInfo:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        fullName:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - message
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
              description: 是否建议客户端重试
            details:
              type: object
              description: 结构化错误详情（例如字段错误、状态冲突上下文）
              additionalProperties: true
            trace_id:
              type: string
              description: 服务端追踪 ID，用于日志排障
        message:
          type: string
