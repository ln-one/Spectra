/api/v1/files:
  post:
    summary: 上传参考文件
    operationId: postFiles
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file, project_id]
            properties:
              file:
                type: string
                format: binary
              project_id:
                type: string
              session_id:
                type: string
                description: 可选会话 ID。提供后，索引与检索按 project_id + session_id 隔离。
    responses:
      '200':
        description: 上传成功
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/UploadResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/files/{file_id}:
  delete:
    summary: 删除上传的文件
    operationId: deleteFilesByFileId
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/files/{file_id}/intent:
  patch:
    summary: 标注文件用途
    operationId: patchFilesByFileIdIntent
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/files.yaml#/UpdateFileIntentRequest'
    responses:
      '200':
        description: 标注成功
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/UpdateFileIntentResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/files/{file_id}/parse/mineru:
  post:
    summary: 同步 MinerU 解析结果
    operationId: postFilesByFileIdParseMineru
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [parsed_text]
            properties:
              parsed_text:
                type: string
              parse_details:
                type: object
              session_id:
                type: string
    responses:
      '200':
        description: 解析结果同步成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/InternalServerError'

/api/v1/files/{file_id}/parse/fallback:
  post:
    summary: 触发降级解析
    operationId: postFilesByFileIdParseFallback
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              session_id:
                type: string
    responses:
      '200':
        description: 已触发降级解析
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/InternalServerError'

/api/v1/files/batch:
  post:
    summary: 批量上传文件
    operationId: postFilesBatch
    description: 一次上传多个参考文件
    tags: [Files]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [files, project_id]
            properties:
              files:
                type: array
                items:
                  type: string
                  format: binary
                description: 多个文件
              project_id:
                type: string
              session_id:
                type: string
                description: 可选会话 ID。提供后，批量上传索引按 project_id + session_id 隔离。
    responses:
      '200':
        description: 批量上传成功
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/BatchUploadResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

  delete:
    summary: 批量删除文件
    operationId: deleteFilesBatch
    tags: [Files]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [file_ids]
            properties:
              file_ids:
                type: array
                items:
                  type: string
                description: 要删除的文件 ID 列表
    responses:
      '200':
        description: 批量删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/BatchDeleteResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
