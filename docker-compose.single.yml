services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - /var/lib/spectra/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - /var/lib/spectra/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    volumes:
      - /var/lib/spectra/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ourograph_db_init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: spectra
    command:
      [
        "sh",
        "-c",
        "until pg_isready -h postgres -U spectra -d postgres; do sleep 1; done; psql -h postgres -U spectra -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'ourograph'\" | grep -q 1 || psql -h postgres -U spectra -d postgres -c \"CREATE DATABASE ourograph\"",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: spectra-backend:deploy
    build:
      context: ./backend
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://spectra:spectra@postgres:5432/spectra
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /var/lib/spectra/uploads
      ARTIFACT_STORAGE_DIR: /var/lib/spectra/artifacts
      GENERATED_DIR: /var/lib/spectra/generated
      PAGEVRA_ENABLED: "true"
      PAGEVRA_BASE_URL: http://pagevra:8090
      PAGEVRA_TIMEOUT_SECONDS: "180"
      STRATUMIND_ENABLED: "true"
      STRATUMIND_BASE_URL: http://stratumind:8110
      STRATUMIND_TIMEOUT_SECONDS: "15"
      OUROGRAPH_ENABLED: "true"
      OUROGRAPH_BASE_URL: http://ourograph:8101
      OUROGRAPH_TIMEOUT_SECONDS: "30"
      STRUCTRA_ENABLED: "true"
      STRUCTRA_BASE_URL: http://pagevra:8090
      STRUCTRA_TIMEOUT_SECONDS: "180"
      RENDER_ENGINE_ENABLED: "true"
      RENDER_ENGINE_BASE_URL: http://pagevra:8090
      RENDER_ENGINE_TIMEOUT_SECONDS: "180"
      POSTGRES_BACKUP_DIR: /var/lib/spectra/backups
      POSTGRES_RESTORE_STAGING_DIR: /var/lib/spectra/restore-staging
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "false"
      UVICORN_RELOAD: "false"
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "8000:8000"
    command: >-
      sh -c "prisma migrate deploy && prisma generate && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    image: spectra-backend:deploy
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://spectra:spectra@postgres:5432/spectra
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /var/lib/spectra/uploads
      ARTIFACT_STORAGE_DIR: /var/lib/spectra/artifacts
      GENERATED_DIR: /var/lib/spectra/generated
      PAGEVRA_ENABLED: "true"
      PAGEVRA_BASE_URL: http://pagevra:8090
      PAGEVRA_TIMEOUT_SECONDS: "180"
      STRATUMIND_ENABLED: "true"
      STRATUMIND_BASE_URL: http://stratumind:8110
      STRATUMIND_TIMEOUT_SECONDS: "15"
      OUROGRAPH_ENABLED: "true"
      OUROGRAPH_BASE_URL: http://ourograph:8101
      OUROGRAPH_TIMEOUT_SECONDS: "30"
      STRUCTRA_ENABLED: "true"
      STRUCTRA_BASE_URL: http://pagevra:8090
      STRUCTRA_TIMEOUT_SECONDS: "180"
      RENDER_ENGINE_ENABLED: "true"
      RENDER_ENGINE_BASE_URL: http://pagevra:8090
      RENDER_ENGINE_TIMEOUT_SECONDS: "180"
      POSTGRES_BACKUP_DIR: /var/lib/spectra/backups
      POSTGRES_RESTORE_STAGING_DIR: /var/lib/spectra/restore-staging
      WORKER_NAME: worker-1
      WORKER_RECOVERY_SCAN: "true"
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    command: >-
      sh -c "prisma migrate deploy && prisma generate && python worker.py"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy

  ourograph:
    image: ${OUROGRAPH_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://spectra:spectra@postgres:5432/ourograph
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STRATUMIND_BASE_URL: http://stratumind:8110
      STRATUMIND_TIMEOUT_SECONDS: "15"
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /var/lib/spectra/uploads
      ARTIFACT_STORAGE_DIR: /var/lib/spectra/artifacts
      GENERATED_DIR: /var/lib/spectra/generated
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "127.0.0.1:8101:8101"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8101/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      ourograph_db_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pagevra:
    image: ${PAGEVRA_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    environment:
      PORT: "8090"
      CHROME_PATH: /usr/bin/chromium
      PAGEVRA_DISTRIBUTION: image
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  diego:
    image: ${DIEGO_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8120:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  stratumind:
    image: ${STRATUMIND_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8110"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_TEXT: stratumind_text_chunks
      QDRANT_COLLECTION_TEXT_ACTIVE: stratumind_text_chunks_v2
      STRATUMIND_EMBEDDING_MODEL: text-embedding-v4
      STRATUMIND_EMBEDDING_DIMENSION: "1024"
      STRATUMIND_RERANK_ENABLED: "true"
      STRATUMIND_RERANK_BASE_URL: http://dualweave:8080
      STRATUMIND_RERANK_CANDIDATE_K: "20"
      STRATUMIND_RERANK_TIMEOUT_SECONDS: "10"
    ports:
      - "127.0.0.1:8110:8110"
    depends_on:
      dualweave:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8110/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    image: spectra-frontend:deploy
    build:
      context: ./frontend
      dockerfile: Dockerfile.deploy
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://47.98.17.72:8000}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-30000}
        NEXT_PUBLIC_CHAT_TIMEOUT_MS: ${NEXT_PUBLIC_CHAT_TIMEOUT_MS:-90000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy

  dualweave:
    image: ${DUALWEAVE_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DUALWEAVE_ADDR: ":8080"
      DUALWEAVE_LOCAL_DIR: /var/lib/dualweave/uploads
      DUALWEAVE_TEXT_RERANK_PROVIDER: dashscope
      DASHSCOPE_TEXT_RERANK_MODEL: qwen3-vl-rerank
    volumes:
      - /var/lib/spectra/dualweave:/var/lib/dualweave/uploads
    ports:
      - "127.0.0.1:8080:8080"
