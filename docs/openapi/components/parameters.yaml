IdempotencyKey:
  name: Idempotency-Key
  in: header
  required: false
  schema:
    type: string
    format: uuid
  description: 幂等性密钥，用于防止重复请求。

PageParam:
  name: page
  in: query
  description: 页码（从1开始）
  schema:
    type: integer
    default: 1
    minimum: 1

LimitParam:
  name: limit
  in: query
  description: 每页数量
  schema:
    type: integer
    default: 20
    minimum: 1
    maximum: 100
