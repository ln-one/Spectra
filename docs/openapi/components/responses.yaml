BadRequest:
  description: 请求参数错误或验证失败
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'

Unauthorized:
  description: 未认证或 Token 无效/过期
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'

Forbidden:
  description: 无权限访问此资源
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'

NotFound:
  description: 请求的资源不存在
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'

Conflict:
  description: 资源冲突
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'

ServiceUnavailable:
  description: 服务不可用
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
