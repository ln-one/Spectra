        data:
          type: object
          properties:
            audio_id:
              type: string
            text:
              type: string
            segments:
              type: array
              items:
                $ref: '#/components/schemas/WebKnowledgeUnit'
            total_segments:
              type: integer
            indexed:
              type: integer
              nullable: true
            language:
              type: string
            confidence:
              type: number
              format: float
            duration:
              type: number
              format: float
            capability_status:
