  get:
    summary: 获取会话运行列表
    operationId: getGenerateSessionRuns
    description: 返回会话的运行记录列表，包含 run 标识、状态与关联成果信息。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - $ref: '../components/parameters.yaml#/ContractVersion'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionRunsResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/generate/sessions/{session_id}/runs/{run_id}:
  get:
    summary: 获取会话运行详情
    operationId: getGenerateSessionRunById
    description: 返回单次运行的详情快照。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: run_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/ContractVersion'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionRunDetailResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/generate/sessions/{session_id}/resume:
  post:
    summary: 恢复中断会话
    operationId: postGenerateSessionsBySessionIdResume
    description: 兼容别名，等价于 command_type=RESUME_SESSION
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../schemas/generate-session-requests.yaml#/ResumeSessionRequest'
    responses:
      '200':
        description: 恢复成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/ResumeSessionResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'
