GenerateRequest:
  type: object
  required: [project_id, type]
  properties:
    project_id:
      type: string
    type:
      $ref: './generate-core.yaml#/GenerationSessionMode'
    options:
      $ref: './generate-core.yaml#/GenerationOptions'
    start_mode:
      type: string
      enum: [direct_generate, draft_then_confirm]
      default: draft_then_confirm
      description: 兼容旧入口时可直接生成，推荐先走大纲确认
    client_session_id:
      type: string
      description: 客户端会话 ID，用于断线重连恢复

GenerateResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        task_id:
          type: string
        session_id:
          type: string
        status:
          $ref: './generate-core.yaml#/GenerateTaskStatus'
        state:
          $ref: './generate-core.yaml#/GenerationState'
    message:
      type: string

GenerateStatusResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        task_id:
          type: string
        session_id:
          type: string
        status:
          $ref: './generate-core.yaml#/GenerateTaskStatus'
        state:
          $ref: './generate-core.yaml#/GenerationState'
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 生成进度百分比
        outline:
          $ref: './generate-core.yaml#/OutlineDocument'
        result:
          type: object
          properties:
            ppt_url:
              type: string
            word_url:
              type: string
            version:
              type: integer
              description: 当前版本号
        error:
          type: string
        error_detail:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
    message:
      type: string

VersionsResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        task_id:
          type: string
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: integer
              created_at:
                type: string
                format: date-time
              status:
                type: string
                enum: [completed, failed]
              file_urls:
                type: object
                properties:
                  ppt_url:
                    type: string
                  word_url:
                    type: string
              modification_note:
                type: string
                description: 修改说明
    message:
      type: string
