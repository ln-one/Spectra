        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              enum:
                - pending
                - processing
                - completed
                - failed
            progress:
              type: integer
              minimum: 0
              maximum: 100
              description: 生成进度百分比
            result:
              type: object
              properties:
                ppt_url:
                  type: string
                word_url:
                  type: string
                version:
                  type: integer
                  description: 当前版本号
            error:
              type: string
        message:
          type: string
    VersionsResponse:
      type: object
