SimpleSuccessResponse:
  type: object
  required: [success, message]
  properties:
    success:
      type: boolean
      example: true
    message:
      type: string
      example: "操作成功"

ErrorResponse:
  type: object
  required: [success, error]
  properties:
    success:
      type: boolean
      example: false
    error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
