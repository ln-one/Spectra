          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
          maxLength: 2000
        grade_level:
          type: string
        status:
          type: string
          enum:
            - draft
            - in_progress
            - completed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GetProjectsResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            projects:
              type: array
              items:
                $ref: '#/components/schemas/Project'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
        message:
          type: string
    ProjectRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
          maxLength: 2000
        grade_level:
          type: string
    ProjectResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            project:
              $ref: '#/components/schemas/Project'
        message:
          type: string
    GetFilesResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            files:
              type: array
              items:
                $ref: '#/components/schemas/UploadedFile'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
        message:
          type: string
    ProjectStatisticsResponse:
      type: object
