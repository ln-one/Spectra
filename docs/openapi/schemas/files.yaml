UploadedFile:
  type: object
  required: [id, filename, file_type, file_size, status, created_at]
  properties:
    id:
      type: string
    filename:
      type: string
    file_type:
      type: string
      enum: [pdf, word, video, image, ppt]
    mime_type:
      type: string
    file_size:
      type: integer
      description: File size in bytes. Maximum allowed size is 100MB (104857600 bytes).
      maximum: 104857600
    status:
      type: string
      enum: [uploading, parsing, ready, failed]
    parse_progress:
      type: integer
      minimum: 0
      maximum: 100
      description: 解析进度百分比
    parse_details:
      type: object
      description: 解析详情
      properties:
        pages_extracted:
          type: integer
          description: 提取的页数
        images_extracted:
          type: integer
          description: 提取的图片数
        text_length:
          type: integer
          description: 提取的文本长度
        duration:
          type: number
          description: 视频时长（秒）
    parse_error:
      type: string
      description: 解析错误信息
    usage_intent:
      type: string
      description: 文件用途说明
    parse_result:
      type: object
      description: 解析结果摘要
      properties:
        chunk_count:
          type: integer
          description: 切分片段数量
        indexed_count:
          type: integer
          description: 入库索引片段数量
        capability_status:
          allOf:
            - $ref: './common.yaml#/CapabilityStatus'
          description: 解析能力状态（含降级信息）
        segments:
          type: array
          description: 视频解析片段（video 场景）
          items:
            type: object
        sources:
          type: array
          description: 来源引用（video 场景）
          items:
            $ref: './common.yaml#/SourceReference'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

UploadResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        file:
          $ref: '#/UploadedFile'
    message:
      type: string

GetFilesResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/UploadedFile'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    message:
      type: string

UpdateFileIntentRequest:
  type: object
  required: [usage_intent]
  properties:
    usage_intent:
      type: string
      minLength: 1
      maxLength: 1000

UpdateFileIntentResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        file:
          $ref: '#/UploadedFile'
    message:
      type: string

BatchUploadResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/UploadedFile'
        total:
          type: integer
          description: 成功上传的文件数
        failed:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              error:
                type: string
          description: 上传失败的文件列表
    message:
      type: string

BatchDeleteResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        deleted:
          type: integer
          description: 成功删除的文件数
        failed:
          type: array
          items:
            type: object
            properties:
              file_id:
                type: string
              error:
                type: string
          description: 删除失败的文件列表
    message:
      type: string
