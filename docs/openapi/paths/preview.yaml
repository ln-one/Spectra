/api/v1/preview/{task_id}:
  get:
    summary: 获取课件预览
    description: 兼容旧任务流（推荐迁移到 /generate/sessions/{session_id}/preview）
    tags: [Preview]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/preview.yaml#/PreviewResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/preview/{task_id}/modify:
  post:
    summary: 提交修改指令
    description: 兼容旧任务流（推荐迁移到 /generate/sessions/{session_id}/preview/modify）
    tags: [Preview]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/preview.yaml#/ModifyRequest'
    responses:
      '200':
        description: 修改任务已创建
        content:
          application/json:
            schema:
              $ref: '../schemas/preview.yaml#/ModifyResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/preview/{task_id}/slides/{slide_id}:
  get:
    summary: 获取单个幻灯片详情
    description: 查看特定幻灯片的详细内容和来源（兼容旧任务流）
    tags: [Preview]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      - name: slide_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/preview.yaml#/SlideDetailResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/preview/{task_id}/export:
  post:
    summary: 导出预览内容
    description: 将预览内容导出为指定格式（兼容旧任务流）
    tags: [Preview]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/preview.yaml#/ExportRequest'
    responses:
      '200':
        description: 导出成功
        content:
          application/json:
            schema:
              $ref: '../schemas/preview.yaml#/ExportResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

