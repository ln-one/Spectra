ExternalFallbackInfo:
  type: object
  required: [capability, fallback_used]
  properties:
    capability:
      type: string
      enum: [document_parser, video_understanding, speech_recognition]
    provider:
      type: string
      description: 原始目标能力或供应商
      example: MinerU
    fallback_used:
      type: boolean
    fallback_target:
      type: string
      description: 实际回退到的能力或供应商
      example: local_parser
    reason_code:
      type: string
      description: 降级原因码（超时/限流/服务不可用等）
      example: PROVIDER_TIMEOUT
    user_message:
      type: string
      description: 可直接展示给用户的降级提示语

SessionTitleSource:
  type: string
  enum: [default, first_message, manual]

RunTitleSource:
  type: string
  enum: [pending, auto, manual, fallback]

RunStatus:
  type: string
  enum: [pending, processing, completed, failed]

RunStep:
  type: string
  enum: [config, outline, generate, preview, modify_slide, completed]

SessionRef:
  type: object
  required: [session_id, project_id, state, contract_version]
  properties:
    session_id:
      type: string
    project_id:
      type: string
    state:
      $ref: './generate-core.yaml#/GenerationState'
    state_reason:
      type: string
      description: 状态附加语义（用于未知状态或灰度状态说明）
    contract_version:
      type: string
      example: '2026-03'
    schema_version:
      type: integer
      minimum: 1
      description: 会话载荷结构版本
    progress:
      type: integer
      minimum: 0
      maximum: 100
    resumable:
      type: boolean
    updated_at:
      type: string
      format: date-time
    display_title:
      type: string
    display_title_source:
      $ref: '#/SessionTitleSource'
    display_title_updated_at:
      type: string
      format: date-time

SessionRun:
  type: object
  required: [run_id, project_id, tool_type, run_no, run_title, run_title_source, run_status, run_step, created_at, updated_at]
  properties:
    run_id:
      type: string
    session_id:
      type: string
      nullable: true
    project_id:
      type: string
    tool_type:
      type: string
    run_no:
      type: integer
      minimum: 1
    run_title:
      type: string
    run_title_source:
      $ref: '#/RunTitleSource'
    run_title_updated_at:
      type: string
      format: date-time
    run_status:
      $ref: '#/RunStatus'
    run_step:
      $ref: '#/RunStep'
    artifact_id:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

RunTracePayload:
  type: object
  properties:
    run_id:
      type: string
    run_no:
      type: integer
      minimum: 1
    tool_type:
      type: string
    run_title:
      type: string
    run_title_source:
      $ref: '#/RunTitleSource'
    run_status:
      $ref: '#/RunStatus'
    run_step:
      $ref: '#/RunStep'
    error:
      type: string

TeachingBriefReadiness:
  type: object
  properties:
    missing_fields:
      type: array
      items:
        type: string
    can_generate:
      type: boolean

TeachingBriefKnowledgePoint:
  type: object
  properties:
    id:
      type: string
    title:
      type: string
    sequence:
      type: integer
    importance:
      type: string
      enum: [core, normal]
    difficulty:
      type: string
      enum: [high, normal, low]
    teaching_method:
      type: string
    notes:
      type: string

TeachingBrief:
  type: object
  properties:
    status:
      type: string
      enum: [draft, review_pending, confirmed, stale]
    version:
      type: integer
    last_confirmed_at:
      type: string
      format: date-time
    topic:
      type: string
    audience:
      type: string
    duration_minutes:
      type: integer
    lesson_hours:
      type: integer
    target_pages:
      type: integer
    teaching_objectives:
      type: array
      items:
        type: string
    knowledge_points:
      type: array
      items:
        $ref: '#/TeachingBriefKnowledgePoint'
    global_emphasis:
      type: array
      items:
        type: string
    global_difficulties:
      type: array
      items:
        type: string
    teaching_strategy:
      type: string
    style_profile:
      type: object
      properties:
        template_family:
          type: string
        visual_tone:
          type: string
        notes:
          type: string
    readiness:
      $ref: '#/TeachingBriefReadiness'

TeachingBriefProposal:
  type: object
  properties:
    proposal_id:
      type: string
    source_message_id:
      type: string
    proposed_changes:
      type: object
      additionalProperties: true
    reasoning_summary:
      type: string
    confidence:
      type: number
    requires_user_confirmation:
      type: boolean
    created_at:
      type: string
      format: date-time

SessionStatePayload:
  type: object
  required: [session]
  properties:
    session:
      $ref: '#/SessionRef'
    options:
      $ref: './generate-core.yaml#/GenerationOptions'
    outline:
      $ref: './generate-core.yaml#/OutlineDocument'
    context_snapshot:
      $ref: './generate-core.yaml#/SessionContextSnapshot'
    capabilities:
      type: array
      description: 服务端能力声明（状态、供应商、可用操作）
      items:
        $ref: './generate-commands.yaml#/CapabilityDeclaration'
    fallbacks:
      type: array
      description: 当前会话发生过的能力降级记录（按时间追加）
      items:
        $ref: '#/ExternalFallbackInfo'
    allowed_actions:
      type: array
      description: 当前状态下允许的下一步动作（防止前后端状态错配）
      items:
        type: string
        example: update_outline
    teaching_brief:
      $ref: '#/TeachingBrief'
    teaching_brief_proposals:
      type: array
      items:
        $ref: '#/TeachingBriefProposal'
    current_run:
      $ref: '#/SessionRun'
    result:
      type: object
      properties:
        ppt_url:
          type: string
        word_url:
          type: string
        version:
          type: integer
          minimum: 1
    error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        fallback:
          $ref: '#/ExternalFallbackInfo'
        transition_guard:
          type: string
          description: 状态转换校验器名称
          example: StateTransitionGuard

GenerationEvent:
  type: object
  required: [event_id, event_type, state, timestamp, cursor]
  properties:
    event_id:
      type: string
    event_schema_version:
      type: integer
      minimum: 1
      default: 1
    event_type:
      $ref: './generate-core.yaml#/GenerationEventType'
    state:
      $ref: './generate-core.yaml#/GenerationState'
    state_reason:
      type: string
    progress:
      type: integer
      minimum: 0
      maximum: 100
    timestamp:
      type: string
      format: date-time
    cursor:
      type: string
      description: 增量消费游标
    payload:
      $ref: '#/RunTracePayload'
