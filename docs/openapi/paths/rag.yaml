/api/v1/rag/search:
  post:
    summary: 检索知识库
    operationId: postRagSearch
    tags: [RAG]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/rag.yaml#/RAGSearchRequest'
    responses:
      '200':
        description: 检索成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/RAGSearchResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/rag/sources/{chunk_id}:
  get:
    summary: 查看来源详情
    operationId: getRagSourcesByChunkId
    tags: [RAG]
    security:
      - BearerAuth: []
    parameters:
      - name: chunk_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/SourceDetailResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/rag/index:
  post:
    summary: 索引新文件到知识库
    operationId: postRagIndex
    description: 将上传的文件添加到 RAG 知识库索引
    tags: [RAG]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [file_id]
            properties:
              file_id:
                type: string
                description: 要索引的文件 ID
              chunk_size:
                type: integer
                default: 512
                description: 分块大小
              chunk_overlap:
                type: integer
                default: 50
                description: 分块重叠大小
    responses:
      '200':
        description: 索引任务已创建
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    index_task_id:
                      type: string
                    status:
                      type: string
                      enum: [pending, processing, completed, failed]
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/rag/similar:
  post:
    summary: 查找相似内容
    operationId: postRagSimilar
    description: 基于给定文本查找知识库中的相似内容
    tags: [RAG]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [text]
            properties:
              text:
                type: string
                description: 要查找相似内容的文本
              top_k:
                type: integer
                default: 5
                minimum: 1
                maximum: 20
              threshold:
                type: number
                format: float
                default: 0.7
                minimum: 0
                maximum: 1
                description: 相似度阈值
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/RAGSearchResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/rag/web-search:
  post:
    summary: 搜索网络资源并可选入库
    tags: [RAG]
    security:
      - BearerAuth: []
    parameters:
      - name: query
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: project_id
        in: query
        required: true
        schema:
          type: string
      - name: max_results
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
          maximum: 20
      - name: auto_index
        in: query
        required: false
        schema:
          type: boolean
          default: false
    responses:
      '200':
        description: 搜索成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/WebSearchResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/rag/audio-transcribe:
  post:
    summary: 音频转录并可选入库
    tags: [RAG]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
                description: 音频文件
              project_id:
                type: string
                description: 可选项目 ID，不传则仅转录不入库
              auto_index:
                type: boolean
                default: false
              language:
                type: string
                default: zh
    responses:
      '200':
        description: 转录成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/AudioTranscribeResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/rag/video-analyze:
  post:
    summary: 视频分析并可选入库
    tags: [RAG]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
                description: 视频文件
              project_id:
                type: string
                description: 可选项目 ID，不传则仅分析不入库
              auto_index:
                type: boolean
                default: false
    responses:
      '200':
        description: 分析成功
        content:
          application/json:
            schema:
              $ref: '../schemas/rag.yaml#/VideoAnalyzeResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
