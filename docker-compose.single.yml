x-backend-runtime-env: &backend-runtime-env
  PYTHONUNBUFFERED: "1"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - /var/lib/spectra/postgres:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - /var/lib/spectra/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    volumes:
      - /var/lib/spectra/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: spectra-backend:deploy
    build:
      context: ./backend
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      <<: *backend-runtime-env
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "8000:8000"
    command: >-
      sh -c "prisma migrate deploy && prisma generate && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    image: spectra-backend:deploy
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      <<: *backend-runtime-env
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    command: >-
      sh -c "prisma migrate deploy && prisma generate && python worker.py"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy

  ourograph:
    image: ${OUROGRAPH_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    environment:
      PORT: "8101"
      OUROGRAPH_DATABASE_URL: postgresql://spectra:spectra@postgres:5432/ourograph
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "127.0.0.1:8101:8101"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8101/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pagevra:
    image: ${PAGEVRA_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8090"
    volumes:
      - /var/lib/spectra:/var/lib/spectra
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  diego:
    image: ${DIEGO_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8120:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  stratumind:
    image: ${STRATUMIND_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8110"
    ports:
      - "127.0.0.1:8110:8110"
    depends_on:
      dualweave:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8110/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    image: spectra-frontend:deploy
    build:
      context: ./frontend
      dockerfile: Dockerfile.deploy
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://47.98.17.72:8000}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-30000}
        NEXT_PUBLIC_CHAT_TIMEOUT_MS: ${NEXT_PUBLIC_CHAT_TIMEOUT_MS:-90000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy

  dualweave:
    image: ${DUALWEAVE_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel main}
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - /var/lib/spectra/dualweave:/var/lib/dualweave/uploads
    ports:
      - "127.0.0.1:8080:8080"
