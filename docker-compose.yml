x-backend-runtime-env: &backend-runtime-env
  - PYTHONUNBUFFERED=1

services:
  dualweave:
    image: ${DUALWEAVE_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - dualweave_data:/var/lib/dualweave/uploads

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  limora:
    image: ${LIMORA_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/limora
      - BETTER_AUTH_SECRET=spectra-limora-local-secret-please-change
      - LIMORA_PUBLIC_BASE_URL=http://localhost:3001
      - LIMORA_ALLOWED_HOSTS=localhost:3001,localhost,limora:3001,limora
      - LIMORA_TRUSTED_ORIGINS=http://localhost:3000,http://frontend:3000,http://backend:8000,http://localhost:8000
      - LIMORA_COOKIE_MODE=local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Qdrant's slim image does not ship curl/wget/nc. Avoid bash /dev/tcp
      # probes because cloud security agents classify that pattern as a
      # reverse-shell indicator.
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=1280
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_TIMEOUT_MS=180000
      - NEXT_PUBLIC_CHAT_TIMEOUT_MS=300000
      - NEXT_PUBLIC_STUDIO_GENERATION_TIMEOUT_MS=600000
    command: npm run dev
    depends_on:
      - backend

  pagevra:
    image: ${PAGEVRA_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - runtime_data:/var/lib/spectra
    environment:
      - PORT=8090
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  diego:
    image: ${DIEGO_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8120:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DIEGO_RUN_STORE=postgres
      - DIEGO_DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - DIEGO_RECOVERY_SCAN_ON_BOOT=1
      - DIEGO_EVENT_POLL_INTERVAL_SEC=0.5
    volumes:
      - runtime_data:/app/.runtime
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  stratumind:
    image: ${STRATUMIND_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8110:8110"
    environment:
      - PORT=8110
    depends_on:
      dualweave:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O-",
          "http://127.0.0.1:8110/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  ourograph:
    image: ${OUROGRAPH_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    ports:
      - "127.0.0.1:8101:8101"
    volumes:
      - runtime_data:/var/lib/spectra
    environment:
      - PORT=8101
      - OUROGRAPH_DATABASE_URL=postgresql://spectra:spectra@postgres:5432/ourograph
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O-",
          "http://127.0.0.1:8101/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stratumind:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      *backend-runtime-env
    command: sh -c "prisma migrate deploy && prisma generate && if [ \"$${UVICORN_RELOAD:-false}\" = \"true\" ]; then uvicorn main:app --host 0.0.0.0 --port 8000 --reload; else uvicorn main:app --host 0.0.0.0 --port 8000; fi"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      limora:
        condition: service_healthy
      dualweave:
        condition: service_started
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=8)",
        ]
      interval: 10s
      timeout: 10s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      *backend-runtime-env
    command: sh -c "prisma migrate deploy && prisma generate && count=$${RQ_WORKER_COUNT:-1}; i=1; while [ $$i -le $$count ]; do WORKER_NAME=worker-$$i python worker.py & i=$$((i+1)); done; wait"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dualweave:
        condition: service_started
      stratumind:
        condition: service_healthy
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy

volumes:
  dualweave_data:
  postgres_data:
  redis_data:
  qdrant_data:
  runtime_data:
