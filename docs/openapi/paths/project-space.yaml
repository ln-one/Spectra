/api/v1/projects/{project_id}/references:
  post:
    summary: 创建项目引用
    operationId: postProjectsByProjectIdReferences
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project-space.yaml#/ProjectReferenceRequest'
    responses:
      '200':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-space.yaml#/ProjectReferenceResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

  get:
    summary: 获取项目引用列表
    operationId: getProjectsByProjectIdReferences
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-space.yaml#/ProjectReferencesResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

