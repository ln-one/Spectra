openapi: 3.0.0
info:
  title: Spectra API
  version: 1.1.0
  description: 多模态AI教学智能体 API - 当前可联调接口规范（仅包含已实现接口）
  license:
    name: Proprietary
    url: http://localhost:8000/license

servers:
  - url: http://localhost:8000
    description: 开发环境

paths:
  # Auth
  /api/v1/auth/register:
    $ref: './openapi/paths/auth.yaml#/~1api~1v1~1auth~1register'
  /api/v1/auth/login:
    $ref: './openapi/paths/auth.yaml#/~1api~1v1~1auth~1login'
  /api/v1/auth/refresh:
    $ref: './openapi/paths/auth.yaml#/~1api~1v1~1auth~1refresh'
  /api/v1/auth/logout:
    $ref: './openapi/paths/auth.yaml#/~1api~1v1~1auth~1logout'
  /api/v1/auth/me:
    $ref: './openapi/paths/auth.yaml#/~1api~1v1~1auth~1me'

  # Chat
  /api/v1/chat/messages:
    $ref: './openapi/paths/chat.yaml#/~1api~1v1~1chat~1messages'
  /api/v1/chat/voice:
    $ref: './openapi/paths/chat.yaml#/~1api~1v1~1chat~1voice'

  # Files
  /api/v1/files:
    $ref: './openapi/paths/files.yaml#/~1api~1v1~1files'
  /api/v1/files/{file_id}:
    $ref: './openapi/paths/files.yaml#/~1api~1v1~1files~1{file_id}'
  /api/v1/files/{file_id}/intent:
    $ref: './openapi/paths/files.yaml#/~1api~1v1~1files~1{file_id}~1intent'
  /api/v1/files/batch:
    $ref: './openapi/paths/files.yaml#/~1api~1v1~1files~1batch'

  # Generate
  /api/v1/generate/sessions:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions'
  /api/v1/generate/sessions/{session_id}:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}'
  /api/v1/generate/sessions/{session_id}/events:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1events'
  /api/v1/generate/sessions/{session_id}/outline:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1outline'
  /api/v1/generate/sessions/{session_id}/commands:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1commands'
  /api/v1/generate/sessions/{session_id}/confirm:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1confirm'
  /api/v1/generate/sessions/{session_id}/candidate-change:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1candidate-change'
  /api/v1/generate/sessions/{session_id}/outline/redraft:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1outline~1redraft'
  /api/v1/generate/sessions/{session_id}/resume:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1resume'
  /api/v1/generate/sessions/{session_id}/slides/{slide_id}/regenerate:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1slides~1{slide_id}~1regenerate'
  /api/v1/generate/capabilities:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1capabilities'
  /api/v1/generate/studio-cards:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards'
  /api/v1/generate/studio-cards/{card_id}:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}'
  /api/v1/generate/studio-cards/{card_id}/execution-plan:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}~1execution-plan'
  /api/v1/generate/studio-cards/{card_id}/execution-preview:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}~1execution-preview'
  /api/v1/generate/studio-cards/{card_id}/execute:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}~1execute'
  /api/v1/generate/studio-cards/{card_id}/refine:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}~1refine'
  /api/v1/generate/studio-cards/{card_id}/sources:
    $ref: './openapi/paths/generate-session.yaml#/~1api~1v1~1generate~1studio-cards~1{card_id}~1sources'

  # Preview
  /api/v1/generate/sessions/{session_id}/preview:
    $ref: './openapi/paths/generate-session-preview.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1preview'
  /api/v1/generate/sessions/{session_id}/preview/modify:
    $ref: './openapi/paths/generate-session-preview.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1preview~1modify'
  /api/v1/generate/sessions/{session_id}/preview/slides/{slide_id}:
    $ref: './openapi/paths/generate-session-preview.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1preview~1slides~1{slide_id}'
  /api/v1/generate/sessions/{session_id}/preview/export:
    $ref: './openapi/paths/generate-session-preview.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1preview~1export'

  # RAG
  /api/v1/rag/search:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1search'
  /api/v1/rag/sources/{chunk_id}:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1sources~1{chunk_id}'
  /api/v1/rag/index:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1index'
  /api/v1/rag/similar:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1similar'
  /api/v1/rag/web-search:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1web-search'
  /api/v1/rag/audio-transcribe:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1audio-transcribe'
  /api/v1/rag/video-analyze:
    $ref: './openapi/paths/rag.yaml#/~1api~1v1~1rag~1video-analyze'

  # Health
  /health:
    $ref: './openapi/paths/health.yaml#/~1health'
  /api/v1/health/capabilities:
    $ref: './openapi/paths/health.yaml#/~1api~1v1~1health~1capabilities'

  # Project
  /api/v1/projects:
    $ref: './openapi/paths/project.yaml#/~1api~1v1~1projects'
  /api/v1/projects/{project_id}:
    $ref: './openapi/paths/project.yaml#/~1api~1v1~1projects~1{project_id}'
  /api/v1/projects/{project_id}/files:
    $ref: './openapi/paths/project.yaml#/~1api~1v1~1projects~1{project_id}~1files'
  /api/v1/projects/{project_id}/statistics:
    $ref: './openapi/paths/project.yaml#/~1api~1v1~1projects~1{project_id}~1statistics'
  /api/v1/projects/search:
    $ref: './openapi/paths/project.yaml#/~1api~1v1~1projects~1search'

components:
  securitySchemes:
    BearerAuth:
      $ref: './openapi/components/security.yaml#/BearerAuth'
