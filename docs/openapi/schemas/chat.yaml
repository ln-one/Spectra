Message:
  type: object
  required: [id, role, content, timestamp]
  properties:
    id:
      type: string
    role:
      type: string
      enum: [user, assistant, system]
    content:
      type: string
    timestamp:
      type: string
      format: date-time
    citations:
      type: array
      description: Structured source citations for assistant responses
      items:
        $ref: './preview.yaml#/SourceReference'

SendMessageRequest:
  type: object
  required: [project_id, content]
  properties:
    project_id:
      type: string
    session_id:
      type: string
      description: Optional session scope id for project-scoped context isolation
    content:
      type: string
      minLength: 1
      maxLength: 10000
    history:
      type: array
      items:
        $ref: '#/Message'
    rag_source_ids:
      type: array
      items:
        type: string
      description: Optional file ids to constrain RAG retrieval scope

SendMessageResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: Session id bound to this response (optional)
        message:
          $ref: '#/Message'
        rag_hit:
          type: boolean
          description: Whether this reply used RAG context
        observability:
          $ref: '#/ChatObservability'
        suggestions:
          type: array
          items:
            type: string
    message:
      type: string

ChatObservability:
  type: object
  description: Observability fields for prompt routing and regression comparison
  properties:
    request_id:
      type: string
    prompt_template_version:
      type: string
    few_shot_version:
      type: string
    route_task:
      type: string
    selected_model:
      type: string
    has_rag_context:
      type: boolean
    prompt_hash:
      type: string
    response_hash:
      type: string
    mechanical_pattern_hit:
      type: boolean
    fallback_triggered:
      type: boolean
    latency_ms:
      type: number
      format: float
    route_decision:
      type: object
      additionalProperties: true

GetMessagesResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: Optional queried session scope
        messages:
          type: array
          items:
            $ref: '#/Message'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    message:
      type: string

VoiceMessageResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: Optional session id bound to this voice interaction
        text:
          type: string
          description: Recognized text
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Recognition confidence
        duration:
          type: number
          format: float
          description: Audio duration in seconds
        message:
          $ref: '#/Message'
          description: Auto-created assistant message
        capability_status:
          allOf:
            - $ref: './common.yaml#/CapabilityStatus'
          description: Speech recognition capability status with degradation semantics
        suggestions:
          type: array
          items:
            type: string
          description: Follow-up suggestions
    message:
      type: string
