components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 璁よ瘉浠ょ墝
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          example: john_doe
        fullName:
          type: string
          example: John Doe
    UserInfo:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        fullName:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - message
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
              description: 鏄惁寤鸿瀹㈡埛绔噸璇?
            details:
              type: object
              description: 缁撴瀯鍖栭敊璇鎯咃紙渚嬪瀛楁閿欒銆佺姸鎬佸啿绐佷笂涓嬫枃锛?
              additionalProperties: true
            trace_id:
              type: string
              description: 鏈嶅姟绔拷韪?ID锛岀敤浜庢棩蹇楁帓闅?
        message:
          type: string
          description: 鏍圭骇閿欒鎽樿锛岄€氬父涓衡€滆姹傚け璐モ€濇垨涓氬姟绾уけ璐ヨ鏄?
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    SimpleSuccessResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
          description: 鎴愬姛鍝嶅簲杞借嵎銆傞儴鍒嗘帴鍙ｅ彲鑳借繑鍥炵┖瀵硅薄銆?
        message:
          type: string
          example: 鎿嶄綔鎴愬姛
    UserInfoResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    SourceReference:
      type: object
      required:
        - chunk_id
        - source_type
        - filename
      properties:
        chunk_id:
          type: string
          description: 鏉ユ簮鐗囨鍞竴鏍囪瘑锛屽彲鐢ㄤ簬鏌ヨ鏉ユ簮璇︽儏
        source_type:
          type: string
          enum:
            - video
            - document
            - ai_generated
        filename:
          type: string
        page_number:
          type: integer
        timestamp:
          type: string
        preview_text:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
        - timestamp
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
            - system
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        citations:
          type: array
          description: Structured source citations for assistant responses
          items:
            $ref: '#/components/schemas/SourceReference'
    GetMessagesResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
              description: Optional queried session scope
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
        message:
          type: string
    SendMessageRequest:
      type: object
      required:
        - project_id
        - content
      properties:
        project_id:
          type: string
        session_id:
          type: string
          description: Optional session scope id for project-scoped context isolation
        content:
          type: string
          minLength: 1
          maxLength: 10000
        history:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        rag_source_ids:
          type: array
          items:
            type: string
          description: Optional file ids to constrain RAG retrieval scope
    ChatObservability:
      type: object
      description: Observability fields for prompt routing and regression comparison
      properties:
        request_id:
          type: string
        prompt_template_version:
          type: string
        few_shot_version:
          type: string
        route_task:
          type: string
        selected_model:
          type: string
        has_rag_context:
          type: boolean
        prompt_hash:
          type: string
        response_hash:
          type: string
        mechanical_pattern_hit:
          type: boolean
        fallback_triggered:
          type: boolean
        latency_ms:
          type: number
          format: float
        route_decision:
          type: object
          additionalProperties: true
    SendMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
              description: Session id bound to this response (optional)
            message:
              $ref: '#/components/schemas/Message'
            rag_hit:
              type: boolean
              description: Whether this reply used RAG context
            observability:
              $ref: '#/components/schemas/ChatObservability'
            suggestions:
              type: array
              items:
                type: string
        message:
          type: string
    CapabilityStatus:
      type: object
      description: 鑳藉姏鎵ц鐘舵€佷笌闄嶇骇淇℃伅锛堢粺涓€瀛楁锛岄€傜敤浜庤В鏋?瑙嗛/璇煶锛?
      required:
        - capability
        - provider
        - status
        - fallback_used
      properties:
        capability:
          type: string
          enum:
            - document_parser
            - video_understanding
            - speech_recognition
          description: 鑳藉姏鏍囪瘑
        provider:
          type: string
          description: 瀹為檯鎵ц鐨?provider锛堝 MinerU銆丵wen-VL銆丗aster-Whisper銆乴ocal_parser锛?
        status:
          type: string
          enum:
            - available
            - degraded
            - unavailable
          description: 鑳藉姏鐘舵€?
        fallback_used:
          type: boolean
          description: 鏄惁鍙戠敓闄嶇骇
        fallback_target:
          type: string
          description: 闄嶇骇鐩爣 provider锛堜粎褰?fallback_used=true 鏃舵湁鍊硷級
        reason_code:
          type: string
          enum:
            - PROVIDER_TIMEOUT
            - PROVIDER_RATE_LIMITED
            - PROVIDER_UNAVAILABLE
            - INVALID_INPUT_FORMAT
            - UNSUPPORTED_FILE_TYPE
            - EMPTY_OUTPUT
            - INTERNAL_ERROR
          description: 澶辫触鎴栭檷绾у師鍥犵爜
        user_message:
          type: string
          description: 鍙洿鎺ュ睍绀虹粰鐢ㄦ埛鐨勬彁绀鸿
        trace_id:
          type: string
          description: 閾捐矾杩借釜 ID
    VoiceMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
              description: Optional session id bound to this voice interaction
            text:
              type: string
              description: Recognized text
            confidence:
              type: number
              format: float
              minimum: 0
              maximum: 1
              description: Recognition confidence
            duration:
              type: number
              format: float
              description: Audio duration in seconds
            message:
              $ref: '#/components/schemas/Message'
              description: Auto-created assistant message
            capability_status:
              allOf:
                - $ref: '#/components/schemas/CapabilityStatus'
              description: Speech recognition capability status with degradation semantics
            suggestions:
              type: array
              items:
                type: string
              description: Follow-up suggestions
        message:
          type: string
    common_SourceReference:
      type: object
      description: 鍐呭鏉ユ簮寮曠敤锛堢敤浜庢函婧愶級
      required:
        - chunk_id
        - source_type
        - filename
      properties:
        chunk_id:
          type: string
          description: 鐗囨鍞竴鏍囪瘑
        source_type:
          type: string
          enum:
            - document
            - web
            - video
            - audio
            - ai_generated
          description: 鏉ユ簮绫诲瀷
        filename:
          type: string
          description: 婧愭枃浠跺悕
        page_number:
          type: integer
          description: 椤电爜锛堟枃妗ｅ満鏅級
        timestamp:
          type: number
