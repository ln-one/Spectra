openapi: 3.0.0
info:
  title: Spectra API
  version: 1.1.0
  description: 多模态AI教学智能体 API - 完整生产对齐版（涵盖双Token、CRUD与业务闭环）
servers:
  - url: 'http://localhost:8000'
    description: 开发环境
  - url: 'https://api.spectra.com'
    description: 生产环境
paths:
  /api/v1/auth/register:
    post:
      summary: 用户注册
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - username
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                username:
                  type: string
                  minLength: 3
                fullName:
                  type: string
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1auth~1login/post/responses/200/content/application~1json/schema'
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '409':
          description: 资源冲突
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1files/post/responses/400/content/application~1json/schema'
  /api/v1/auth/login:
    post:
      summary: 用户登录
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      expires_in:
                        type: integer
                      user:
                        $ref: '#/paths/~1api~1v1~1auth~1me/get/responses/200/content/application~1json/schema/properties/data/properties/user'
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
  /api/v1/auth/refresh:
    post:
      summary: 刷新 Access Token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 长期有效的刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1auth~1login/post/responses/200/content/application~1json/schema'
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 操作成功
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
  /api/v1/auth/me:
    get:
      summary: 获取当前用户信息
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        required:
                          - id
                          - email
                          - username
                          - createdAt
                        properties:
                          id:
                            type: string
                          email:
                            type: string
                            format: email
                          username:
                            type: string
                          fullName:
                            type: string
                          createdAt:
                            type: string
                            format: date-time
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
  /api/v1/chat/messages:
    post:
      summary: 发送消息
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/paths/~1api~1v1~1files/post/parameters/0'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - content
              properties:
                project_id:
                  type: string
                content:
                  type: string
                history:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - role
                      - content
                      - timestamp
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                          - system
                      content:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        $ref: '#/paths/~1api~1v1~1chat~1messages/post/requestBody/content/application~1json/schema/properties/history/items'
                      suggestions:
                        type: array
                        items:
                          type: string
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
    get:
      summary: 获取对话历史
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/paths/~1api~1v1~1projects/get/parameters/0'
        - $ref: '#/paths/~1api~1v1~1projects/get/parameters/1'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      messages:
                        type: array
                        items:
                          $ref: '#/paths/~1api~1v1~1chat~1messages/post/requestBody/content/application~1json/schema/properties/history/items'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
  /api/v1/files:
    post:
      summary: 上传参考文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: 幂等性密钥，防重发。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - project_id
              properties:
                file:
                  type: string
                  format: binary
                project_id:
                  type: string
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      file:
                        type: object
                        required:
                          - id
                          - filename
                          - file_type
                          - file_size
                          - status
                          - created_at
                        properties:
                          id:
                            type: string
                          filename:
                            type: string
                          file_type:
                            type: string
                            enum:
                              - pdf
                              - word
                              - video
                              - image
                              - ppt
                          mime_type:
                            type: string
                          file_size:
                            type: integer
                          status:
                            type: string
                            enum:
                              - uploading
                              - parsing
                              - ready
                              - failed
                          usage_intent:
                            type: string
                          parse_result:
                            type: object
                          created_at:
                            type: string
                            format: date-time
                          updated_at:
                            type: string
                            format: date-time
                  message:
                    type: string
        '400':
          description: 请求参数错误或验证失败
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '401':
          description: 未认证或 Token 无效/过期
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1files/post/responses/400/content/application~1json/schema'
        '403':
          description: 无权限访问此资源
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1files/post/responses/400/content/application~1json/schema'
  '/api/v1/files/{file_id}':
    delete:
      summary: 删除上传的文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1auth~1logout/post/responses/200/content/application~1json/schema'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          $ref: '#/paths/~1api~1v1~1preview~1%7Btask_id%7D/get/responses/404'
  '/api/v1/files/{file_id}/intent':
    patch:
      summary: 标注文件用途
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usage_intent
              properties:
                usage_intent:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: 标注成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      file:
                        $ref: '#/paths/~1api~1v1~1files/post/responses/200/content/application~1json/schema/properties/data/properties/file'
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          $ref: '#/paths/~1api~1v1~1preview~1%7Btask_id%7D/get/responses/404'
  /api/v1/generate/courseware:
    post:
      summary: 生成课件
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/paths/~1api~1v1~1files/post/parameters/0'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - type
              properties:
                project_id:
                  type: string
                type:
                  type: string
                  enum:
                    - ppt
                    - word
                    - both
                options:
                  type: object
                  properties:
                    style:
                      type: string
                    pages:
                      type: integer
      responses:
        '200':
          description: 生成任务已创建
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                      status:
                        type: string
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
  '/api/v1/generate/status/{task_id}':
    get:
      summary: 查询生成状态
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                      status:
                        type: string
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                      progress:
                        type: integer
                      result:
                        type: object
                        properties:
                          ppt_url:
                            type: string
                          word_url:
                            type: string
                      error:
                        type: string
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          $ref: '#/paths/~1api~1v1~1preview~1%7Btask_id%7D/get/responses/404'
  '/api/v1/preview/{task_id}':
    get:
      summary: 获取课件预览
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                      slides:
                        type: array
                        items:
                          type: object
                          required:
                            - id
                            - index
                            - title
                            - content
                          properties:
                            id:
                              type: string
                            index:
                              type: integer
                            title:
                              type: string
                            content:
                              type: string
                            sources:
                              type: array
                              items:
                                $ref: '#/paths/~1api~1v1~1rag~1sources~1%7Bchunk_id%7D/get/responses/200/content/application~1json/schema/properties/data/properties/source'
                            thumbnail_url:
                              type: string
                      lesson_plan:
                        type: object
                        properties:
                          teaching_objectives:
                            type: array
                            items:
                              type: string
                          slides_plan:
                            type: array
                            items:
                              type: object
                              required:
                                - slide_id
                                - teaching_goal
                                - teacher_script
                              properties:
                                slide_id:
                                  type: string
                                teaching_goal:
                                  type: string
                                teacher_script:
                                  type: string
                                teaching_suggestions:
                                  type: array
                                  items:
                                    type: string
                                suggested_duration:
                                  type: integer
                                material_sources:
                                  type: array
                                  items:
                                    $ref: '#/paths/~1api~1v1~1rag~1sources~1%7Bchunk_id%7D/get/responses/200/content/application~1json/schema/properties/data/properties/source'
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          description: 请求的资源不存在
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1files/post/responses/400/content/application~1json/schema'
  '/api/v1/preview/{task_id}/modify':
    post:
      summary: 提交修改指令
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/paths/~1api~1v1~1files/post/parameters/0'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instruction
              properties:
                instruction:
                  type: string
                target_slides:
                  type: array
                  items:
                    type: string
                context:
                  type: object
      responses:
        '200':
          description: 修改任务已创建
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      modify_task_id:
                        type: string
                      status:
                        type: string
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          $ref: '#/paths/~1api~1v1~1preview~1%7Btask_id%7D/get/responses/404'
  /api/v1/rag/search:
    post:
      summary: 检索知识库
      tags:
        - RAG
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - query
              properties:
                project_id:
                  type: string
                query:
                  type: string
                top_k:
                  type: integer
                  default: 5
                filters:
                  type: object
                  properties:
                    file_types:
                      type: array
                      items:
                        type: string
                        enum:
                          - pdf
                          - word
                          - video
                          - image
                          - ppt
                    file_ids:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: 检索成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          required:
                            - chunk_id
                            - content
                            - score
                            - source
                          properties:
                            chunk_id:
                              type: string
                            content:
                              type: string
                            score:
                              type: number
                              format: float
                            source:
                              $ref: '#/paths/~1api~1v1~1rag~1sources~1%7Bchunk_id%7D/get/responses/200/content/application~1json/schema/properties/data/properties/source'
                            metadata:
                              type: object
                      total:
                        type: integer
                  message:
                    type: string
        '400':
          $ref: '#/paths/~1api~1v1~1files/post/responses/400'
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
  '/api/v1/rag/sources/{chunk_id}':
    get:
      summary: 查看来源详情
      tags:
        - RAG
      security:
        - BearerAuth: []
      parameters:
        - name: chunk_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      chunk_id:
                        type: string
                      content:
                        type: string
                      source:
                        type: object
                        required:
                          - chunk_id
                          - source_type
                          - filename
                        properties:
                          chunk_id:
                            type: string
                          source_type:
                            type: string
                            enum:
                              - video
                              - document
                              - ai_generated
                          filename:
                            type: string
                          page_number:
                            type: integer
                          timestamp:
                            type: string
                          preview_text:
                            type: string
                      context:
                        type: object
                        properties:
                          previous_chunk:
                            type: string
                          next_chunk:
                            type: string
                      file_info:
                        $ref: '#/paths/~1api~1v1~1files/post/responses/200/content/application~1json/schema/properties/data/properties/file'
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1v1~1files/post/responses/401'
        '403':
          $ref: '#/paths/~1api~1v1~1files/post/responses/403'
        '404':
          $ref: '#/paths/~1api~1v1~1preview~1%7Btask_id%7D/get/responses/404'
  /api/v1/projects:
    post:
      summary: 创建项目
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/paths/~1api~1v1~1files/post/parameters/0'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - description
              properties:
                name:
                  type: string
                description:
                  type: string
                grade_level:
                  type: string
      responses:
        '200':
          description: 项目创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      project:
                        type: object
                        required:
                          - id
