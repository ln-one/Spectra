/api/v1/projects/{project_id}/references:
  post:
    summary: 创建项目引用
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project-space.yaml#/ProjectReferenceRequest'
    responses:
      '200':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-space.yaml#/ProjectReferenceResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

  get:
    summary: 获取项目引用列表
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-space.yaml#/ProjectReferencesResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/projects/{project_id}/references/{reference_id}:
  patch:
    summary: 更新项目引用
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project-space.yaml#/ProjectReferenceUpdateRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-space.yaml#/ProjectReferenceResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

  delete:
    summary: 删除项目引用
    tags: [Project, Reference]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

