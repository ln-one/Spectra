openapi: 3.0.0
info:
  title: Spectra API
  version: 1.1.0
  description: 多模态AI教学智能体 API - 完整生产对齐版（涵盖双Token、CRUD与业务闭环）
servers:
  - url: http://localhost:8000
    description: 开发环境
  - url: https://api.spectra.com
    description: 生产环境
paths:
  /api/v1/auth/register:
    post:
      summary: 用户注册
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/login:
    post:
      summary: 用户登录
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/refresh:
    post:
      summary: 刷新 Access Token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 长期有效的刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me:
    get:
      summary: 获取当前用户信息
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/chat/messages:
    post:
      summary: 发送消息
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: 获取对话历史
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessagesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/chat/voice:
    post:
      summary: 语音消息输入
      description: 上传语音文件，系统将自动识别并转换为文本消息
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio
                - project_id
              properties:
                audio:
                  type: string
                  format: binary
                  description: 音频文件（支持 wav, mp3, m4a, ogg）
                project_id:
                  type: string
                  description: 项目 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/files:
    post:
      summary: 上传参考文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - project_id
              properties:
                file:
                  type: string
                  format: binary
                project_id:
                  type: string
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/files/{file_id}:
    delete:
      summary: 删除上传的文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/files/{file_id}/intent:
    patch:
      summary: 标注文件用途
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileIntentRequest'
      responses:
        '200':
          description: 标注成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFileIntentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/files/batch:
    post:
      summary: 批量上传文件
      description: 一次上传多个参考文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
                - project_id
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 多个文件
                project_id:
                  type: string
      responses:
        '200':
          description: 批量上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: 批量删除文件
      tags:
        - Files
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_ids
              properties:
                file_ids:
                  type: array
                  items:
                    type: string
                  description: 要删除的文件 ID 列表
      responses:
        '200':
          description: 批量删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/courseware:
    post:
      summary: 生成课件
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: 生成任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/tasks/{task_id}/status:
    get:
      summary: 查询生成状态
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/tasks/{task_id}/download:
    get:
      summary: 下载生成的课件文件
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: file_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - ppt
              - word
          description: 要下载的文件类型
      responses:
        '200':
          description: 文件下载成功
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/tasks/{task_id}/versions:
    get:
      summary: 获取任务的所有版本
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/preview/{task_id}:
    get:
      summary: 获取课件预览
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/preview/{task_id}/modify:
    post:
      summary: 提交修改指令
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyRequest'
      responses:
        '200':
          description: 修改任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/preview/{task_id}/slides/{slide_id}:
    get:
      summary: 获取单个幻灯片详情
      description: 查看特定幻灯片的详细内容和来源
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: slide_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlideDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/preview/{task_id}/export:
    post:
      summary: 导出预览内容
      description: 将预览内容导出为指定格式
      tags:
        - Preview
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - format
              properties:
                format:
                  type: string
                  enum:
                    - json
                    - markdown
                    - html
                  description: 导出格式
                include_sources:
                  type: boolean
                  default: true
                  description: 是否包含来源信息
      responses:
        '200':
          description: 导出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      content:
                        type: string
                        description: 导出的内容
                      format:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/rag/search:
    post:
      summary: 检索知识库
      tags:
        - RAG
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGSearchRequest'
      responses:
        '200':
          description: 检索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/rag/sources/{chunk_id}:
    get:
      summary: 查看来源详情
      tags:
        - RAG
      security:
        - BearerAuth: []
      parameters:
        - name: chunk_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/rag/index:
    post:
      summary: 索引新文件到知识库
      description: 将上传的文件添加到 RAG 知识库索引
      tags:
        - RAG
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_id
              properties:
                file_id:
                  type: string
                  description: 要索引的文件 ID
                chunk_size:
                  type: integer
                  default: 512
                  description: 分块大小
                chunk_overlap:
                  type: integer
                  default: 50
                  description: 分块重叠大小
      responses:
        '200':
          description: 索引任务已创建
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      index_task_id:
                        type: string
                      status:
                        type: string
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/rag/similar:
    post:
      summary: 查找相似内容
      description: 基于给定文本查找知识库中的相似内容
      tags:
        - RAG
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: 要查找相似内容的文本
                top_k:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 20
                threshold:
                  type: number
                  format: float
                  default: 0.7
                  minimum: 0
                  maximum: 1
                  description: 相似度阈值
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/projects:
    post:
      summary: 创建项目
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: 项目创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: 获取项目列表
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProjectsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/projects/{project_id}:
    get:
      summary: 获取项目详情
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: 修改项目信息
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除项目
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/projects/{project_id}/files:
    get:
      summary: 获取项目的上传文件列表
      tags:
        - Project
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFilesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/projects/{project_id}/statistics:
    get:
      summary: 获取项目统计信息
      description: 获取项目的文件数、对话数、生成任务数等统计信息
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStatisticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/projects/search:
    get:
      summary: 搜索项目
      description: 根据关键词搜索项目
      tags:
        - Project
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: 搜索关键词
        - name: status
          in: query
          schema:
            type: string
            enum:
              - draft
              - in_progress
              - completed
          description: 按状态筛选
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProjectsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 认证令牌
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          example: john_doe
        fullName:
          type: string
          example: John Doe
    UserInfo:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        fullName:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    SimpleSuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
    UserInfoResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
        - timestamp
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
            - system
        content:
          type: string
        timestamp:
          type: string
          format: date-time
    GetMessagesResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
        message:
          type: string
    SendMessageRequest:
      type: object
      required:
        - project_id
        - content
      properties:
        project_id:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 10000
        history:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    SendMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              $ref: '#/components/schemas/Message'
            suggestions:
              type: array
              items:
                type: string
        message:
          type: string
    VoiceMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            text:
              type: string
              description: 识别的文本内容
            confidence:
              type: number
              format: float
              minimum: 0
              maximum: 1
              description: 识别置信度
            duration:
              type: number
              format: float
              description: 音频时长（秒）
            message:
              $ref: '#/components/schemas/Message'
              description: 自动创建的消息对象
            suggestions:
              type: array
              items:
                type: string
              description: AI 建议
        message:
          type: string
    UploadedFile:
      type: object
      required:
        - id
        - filename
        - file_type
        - file_size
        - status
        - created_at
      properties:
        id:
          type: string
        filename:
          type: string
        file_type:
          type: string
          enum:
            - pdf
            - word
            - video
            - image
            - ppt
        mime_type:
          type: string
        file_size:
          type: integer
          description: File size in bytes. Maximum allowed size is 100MB (104857600 bytes).
          maximum: 104857600
        status:
          type: string
          enum:
            - uploading
            - parsing
            - ready
            - failed
        parse_progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 解析进度百分比
        parse_details:
          type: object
          description: 解析详情
          properties:
            pages_extracted:
              type: integer
              description: 提取的页数
            images_extracted:
              type: integer
              description: 提取的图片数
            text_length:
              type: integer
              description: 提取的文本长度
            duration:
              type: number
              description: 视频时长（秒）
        parse_error:
          type: string
          description: 解析错误信息
        usage_intent:
          type: string
          description: 文件用途说明
        parse_result:
          type: object
          description: 解析结果摘要
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UploadResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            file:
              $ref: '#/components/schemas/UploadedFile'
        message:
          type: string
    UpdateFileIntentRequest:
      type: object
      required:
        - usage_intent
      properties:
        usage_intent:
          type: string
          minLength: 1
          maxLength: 1000
    UpdateFileIntentResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            file:
              $ref: '#/components/schemas/UploadedFile'
        message:
          type: string
    BatchUploadResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            files:
              type: array
              items:
                $ref: '#/components/schemas/UploadedFile'
            total:
              type: integer
              description: 成功上传的文件数
            failed:
              type: array
              items:
                type: object
                properties:
                  filename:
                    type: string
                  error:
                    type: string
              description: 上传失败的文件列表
        message:
          type: string
    BatchDeleteResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            deleted:
              type: integer
              description: 成功删除的文件数
            failed:
              type: array
              items:
                type: object
                properties:
                  file_id:
                    type: string
                  error:
                    type: string
              description: 删除失败的文件列表
        message:
          type: string
    GenerateRequest:
      type: object
      required:
        - project_id
        - type
      properties:
        project_id:
          type: string
        type:
          type: string
          enum:
            - ppt
            - word
            - both
        options:
          type: object
          properties:
            template:
              type: string
              enum:
                - default
                - gaia
                - uncover
                - academic
              default: default
              description: PPT 模板风格
            theme_color:
              type: string
              pattern: ^#[0-9A-Fa-f]{6}$
              description: 主题色（十六进制颜色代码）
              example: '#4A90E2'
            show_page_number:
              type: boolean
              default: true
              description: 是否显示页码
            header:
              type: string
              description: 页眉文本
            footer:
              type: string
              description: 页脚文本
            pages:
              type: integer
              minimum: 1
              maximum: 100
              description: 期望的页数
            include_animations:
              type: boolean
              default: false
              description: 是否生成动画创意
            include_games:
              type: boolean
              default: false
              description: 是否生成互动游戏
            animation_format:
              type: string
              enum:
                - gif
                - mp4
                - html5
              description: 动画输出格式（当 include_animations 为 true 时）
    GenerateResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              enum:
                - pending
                - processing
                - completed
                - failed
        message:
          type: string
    GenerateStatusResponse:
      type: object
