        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            project_id:
              type: string
            files_count:
              type: integer
              description: 上传的文件数
            messages_count:
              type: integer
              description: 对话消息数
            generation_tasks_count:
              type: integer
              description: 生成任务数
            completed_tasks_count:
              type: integer
              description: 已完成的任务数
            total_file_size:
              type: integer
              description: 文件总大小（字节）
            last_activity:
              type: string
              format: date-time
              description: 最后活动时间
            created_at:
              type: string
              format: date-time
        message:
          type: string
  responses:
    BadRequest:
      description: 请求参数错误或验证失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 资源冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 Token 无效/过期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 无权限访问此资源
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 请求的资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    PageParam:
      name: page
      in: query
      description: 页码（从1开始）
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      description: 每页数量
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: 幂等性密钥，用于防止重复请求。
