openapi: 3.0.0
info:
  title: Spectra API
  version: 1.1.0
  description: 多模态AI教学智能体 API - 当前可联调接口规范（仅包含已实现接口）
servers:
  - url: http://localhost:8000
    description: 开发环境
  - url: https://api.spectra.com
    description: 生产环境
paths:
  /api/v1/auth/register:
    post:
      summary: 用户注册
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/login:
    post:
      summary: 用户登录
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/refresh:
    post:
      summary: 刷新 Access Token
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 长期有效的刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me:
    get:
      summary: 获取当前用户信息
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/chat/messages:
    post:
      summary: 发送消息
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: 获取对话历史
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
          description: 项目 ID。当前实现按 project 维度隔离对话上下文。
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: 可选会话 ID。提供后按 project_id + session_id 作用域读取历史。
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessagesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/chat/voice:
    post:
      summary: 语音消息输入
      description: 上传语音文件，系统将自动识别并转换为文本消息
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio
                - project_id
              properties:
                audio:
                  type: string
                  format: binary
                  description: 音频文件（支持 wav, mp3, m4a, ogg）
                project_id:
                  type: string
                  description: 项目 ID
                session_id:
                  type: string
                  description: 可选会话 ID。提供后按 project_id + session_id 作用域处理语音对话。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/files:
    post:
      summary: 上传参考文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - project_id
              properties:
                file:
                  type: string
                  format: binary
                project_id:
                  type: string
                session_id:
                  type: string
                  description: 可选会话 ID。提供后，索引与检索按 project_id + session_id 隔离。
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/files/{file_id}:
    delete:
      summary: 删除上传的文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/files/{file_id}/intent:
    patch:
      summary: 标注文件用途
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileIntentRequest'
      responses:
        '200':
          description: 标注成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFileIntentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/files/batch:
    post:
      summary: 批量上传文件
      description: 一次上传多个参考文件
      tags:
        - Files
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
                - project_id
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 多个文件
                project_id:
                  type: string
                session_id:
                  type: string
                  description: 可选会话 ID。提供后，批量上传索引按 project_id + session_id 隔离。
      responses:
        '200':
          description: 批量上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: 批量删除文件
      tags:
        - Files
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_ids
              properties:
                file_ids:
                  type: array
                  items:
                    type: string
                  description: 要删除的文件 ID 列表
      responses:
        '200':
          description: 批量删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/courseware:
    post:
      summary: 生成课件（兼容入口）
      description: |
        兼容旧版的一次性创建接口。新流程推荐使用 /generate/sessions 系列接口，
        支持阶段式中断、事件流推送与局部重绘。
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: 生成任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/sessions:
    post:
      summary: 创建生成会话
      description: 创建可中断、可恢复的课件生成会话（契约优先主入口）
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGenerationSessionRequest'
      responses:
        '200':
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGenerationSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/sessions/{session_id}:
    get:
      summary: 查询生成会话快照
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ContractVersion'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/sessions/{session_id}/events:
    get:
      summary: 获取生成事件流（SSE）
      description: |
        默认返回 text/event-stream。当客户端无法使用 SSE 时，可通过 `accept=application/json`
        返回短轮询事件列表。
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 事件游标（用于断线续传）
        - name: accept
          in: query
          required: false
          schema:
            type: string
            enum:
              - text/event-stream
              - application/json
            default: text/event-stream
        - $ref: '#/components/parameters/ContractVersion'
      responses:
        '200':
          description: 成功
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream，data 字段符合 GenerationEvent
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/sessions/{session_id}/outline:
    put:
      summary: 更新大纲并回写会话
      description: 兼容别名，等价于 command_type=UPDATE_OUTLINE
      deprecated: true
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOutlineRequest'
      responses:
        '200':
          description: 大纲更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateOutlineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/sessions/{session_id}/commands:
    post:
      summary: 执行会话命令（唯一写入口）
      description: |
        所有会引起状态变化或内容变化的操作统一通过 Command 接口执行。
        服务层必须通过统一状态转换校验器（StateTransitionGuard）决定是否允许执行。
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationSessionCommandRequest'
      responses:
        '200':
          description: 命令已执行或接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationSessionCommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/sessions/{session_id}/confirm:
    post:
      summary: 确认大纲并继续生成
      description: 兼容别名，等价于 command_type=CONFIRM_OUTLINE
      deprecated: true
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmOutlineRequest'
      responses:
        '200':
          description: 已进入内容生成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmOutlineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/sessions/{session_id}/outline/redraft:
    post:
      summary: 请求 AI 重写大纲
      description: 兼容别名，等价于 command_type=REDRAFT_OUTLINE
      deprecated: true
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedraftOutlineRequest'
      responses:
        '200':
          description: 已进入大纲重写阶段
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedraftOutlineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/sessions/{session_id}/resume:
    post:
      summary: 恢复中断会话
      description: 兼容别名，等价于 command_type=RESUME_SESSION
      deprecated: true
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeSessionRequest'
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/sessions/{session_id}/slides/{slide_id}/regenerate:
    post:
      summary: 局部重绘单页
      description: 兼容别名，等价于 command_type=REGENERATE_SLIDE
      deprecated: true
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: slide_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ContractVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateSlideRequest'
      responses:
        '200':
          description: 局部重绘成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenerateSlideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/generate/capabilities:
    get:
      summary: 获取生成域能力声明
      description: 返回服务端当前支持的契约版本、特性开关与弃用信息。
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ContractVersion'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/generate/tasks/{task_id}/status:
    get:
      summary: 查询生成状态
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/tasks/{task_id}/download:
    get:
      summary: 下载生成的课件文件
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: file_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - ppt
              - word
          description: 要下载的文件类型
      responses:
        '200':
          description: 文件下载成功
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/generate/tasks/{task_id}/versions:
    get:
      summary: 获取任务的所有版本
      tags:
        - Generate
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
