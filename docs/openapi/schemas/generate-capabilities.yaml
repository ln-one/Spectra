CapabilityStatus:
  type: string
  enum: [available, degraded, unavailable]

CapabilityDeclaration:
  type: object
  required: [name, status, operations]
  properties:
    name:
      type: string
      enum:
        - document_parser
        - video_understanding
        - speech_recognition
        - outline_generation
        - slide_regeneration
        - event_stream
    status:
      $ref: '#/CapabilityStatus'
    providers:
      type: array
      items:
        type: string
    default_provider:
      type: string
    fallback_chain:
      type: array
      items:
        type: string
    operations:
      type: array
      items:
        type: string
    status_message:
      type: string

StateTransitionRule:
  type: object
  required: [command_type, from_state, to_state]
  properties:
    command_type:
      $ref: './generate-command-core.yaml#/GenerationCommandType'
    from_state:
      $ref: './generate-core.yaml#/GenerationState'
    to_state:
      $ref: './generate-core.yaml#/GenerationState'

StateMachineDeclaration:
  type: object
  required: [states, terminal_states, transitions]
  properties:
    states:
      type: array
      items:
        $ref: './generate-core.yaml#/GenerationState'
    terminal_states:
      type: array
      items:
        $ref: './generate-core.yaml#/GenerationState'
    transitions:
      type: array
      items:
        $ref: '#/StateTransitionRule'

StudioCardConfigOption:
  type: object
  required: [value, label]
  properties:
    value:
      type: string
    label:
      type: string
    description:
      type: string

StudioCardConfigField:
  type: object
  required: [key, label, type, required]
  properties:
    key:
      type: string
    label:
      type: string
    type:
      type: string
      enum: [select, multiselect, boolean, integer, text, reference]
    required:
      type: boolean
    options:
      type: array
      items:
        $ref: '#/StudioCardConfigOption'
    placeholder:
      type: string
    default_value:
      oneOf:
        - type: string
        - type: integer
        - type: boolean
    notes:
      type: string

StudioCardAction:
  type: object
  required: [type, label]
  properties:
    type:
      type: string
    label:
      type: string
    notes:
      type: string

StudioCardCapability:
  type: object
  required:
    [
      id,
      title,
      readiness,
      context_mode,
      execution_mode,
      primary_capabilities,
      related_capabilities,
      artifact_types,
      requires_source_artifact,
      supports_chat_refine,
      supports_selection_context,
      config_fields,
      actions,
    ]
  properties:
    id:
      type: string
    title:
      type: string
    readiness:
      type: string
      enum: [ready, foundation_ready, protocol_pending]
    context_mode:
      type: string
      enum: [session, artifact, hybrid]
    execution_mode:
      type: string
      enum: [session_command, artifact_create, composite]
    primary_capabilities:
      type: array
      items:
        type: string
    related_capabilities:
      type: array
      items:
        type: string
    artifact_types:
      type: array
      items:
        type: string
    session_output_type:
      type: string
      enum: [ppt, word, both]
    requires_source_artifact:
      type: boolean
    supports_chat_refine:
      type: boolean
    supports_selection_context:
      type: boolean
    config_fields:
      type: array
      items:
        $ref: '#/StudioCardConfigField'
    actions:
      type: array
      items:
        $ref: '#/StudioCardAction'
    notes:
      type: string

GenerationCapabilitiesResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      required: [contract_versions, default_contract_version, capabilities, studio_cards, state_machine, command_interface]
      properties:
        contract_versions:
          type: array
          items:
            type: string
        default_contract_version:
          type: string
        command_interface:
          type: object
          required: [endpoint, supported_commands]
          properties:
            endpoint:
              type: string
              example: /api/v1/generate/sessions/{session_id}/commands
            supported_commands:
              type: array
              items:
                $ref: './generate-command-core.yaml#/GenerationCommandType'
        capabilities:
          type: array
          items:
            $ref: '#/CapabilityDeclaration'
        studio_cards:
          type: array
          items:
            $ref: '#/StudioCardCapability'
        state_machine:
          $ref: '#/StateMachineDeclaration'
        deprecations:
          type: array
          items:
            type: object
            properties:
              api:
                type: string
              sunset_at:
                type: string
                format: date-time
              replacement:
                type: string
    message:
      type: string

StudioCardsCatalogResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      required: [studio_cards]
      properties:
        studio_cards:
          type: array
          items:
            $ref: '#/StudioCardCapability'
    message:
      type: string
