/api/v1/generate/sessions:
  get:
    summary: 获取生成会话列表
    operationId: getGenerateSessions
    description: 返回项目内生成会话列表（按更新时间倒序），包含展示标题字段。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: query
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - $ref: '../components/parameters.yaml#/ContractVersion'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionListResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
  post:
    summary: 创建生成会话
    operationId: postGenerateSessions
    description: 创建可中断、可恢复的课件生成会话，并初始化会话展示标题。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate-session-requests-target.yaml#/CreateGenerationSessionRequestTarget'
    responses:
      '200':
        description: 会话创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/CreateGenerationSessionResponseTarget'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/generate/sessions/{session_id}:
  get:
    summary: 查询生成会话快照
    operationId: getGenerateSessionsBySessionId
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/ContractVersion'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/generate/sessions/{session_id}/events:
  get:
    summary: 获取生成事件流（SSE）
    operationId: getGenerateSessionsBySessionIdEvents
    description: |
      默认返回 text/event-stream。当客户端无法使用 SSE 时，可通过 `accept=application/json`
      返回短轮询事件列表。目标契约中事件 payload 需要支持 run 追踪、大纲逐条输出、PPT 逐页输出与单页局部修改进展。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: accept
        in: query
        required: false
        schema:
          type: string
          enum: [text/event-stream, application/json]
          default: text/event-stream
      - $ref: '../components/parameters.yaml#/ContractVersion'
    responses:
      '200':
        description: 成功
        content:
          text/event-stream:
            schema:
              type: string
              description: SSE stream，data 字段符合 GenerationEventTarget
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationEventListResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

