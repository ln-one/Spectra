            - disconnected
        redis:
          type: string
          enum:
            - connected
            - disconnected
        db_required:
          type: boolean
        redis_required:
          type: boolean
    CapabilitiesHealthResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            document_parser:
