          type: boolean
        data:
          type: object
          properties:
            chunk_id:
              type: string
            content:
              type: string
            source:
              $ref: '#/components/schemas/SourceReference'
            context:
              type: object
              properties:
                previous_chunk:
                  type: string
                next_chunk:
                  type: string
            file_info:
              $ref: '#/components/schemas/UploadedFile'
        message:
          type: string
    WebKnowledgeUnit:
      type: object
      required:
        - chunk_id
        - source_type
        - content
        - metadata
      properties:
        chunk_id:
          type: string
        source_type:
          type: string
          enum:
            - web
            - audio
            - video
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        citation:
          allOf:
            - $ref: '#/components/schemas/SourceReference'
    WebSearchResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            results:
