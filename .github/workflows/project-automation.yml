name: Project Automation

# Automatically adds issues and pull requests to the GitHub Projects v2 board
# and keeps the Status field in sync with the item's lifecycle.
#
# Status transitions driven by this workflow:
#   Issue opened           → Backlog
#   Issue assigned         → Ready
#   Issue closed           → Done
#   PR opened (draft)      → Backlog
#   PR ready for review    → In review
#   PR closed + merged     → Done
#
# Prerequisites:
#   • Secret  PROJECTS_PAT  – classic PAT or fine-grained token with "project"
#     read/write scope (the default GITHUB_TOKEN cannot write to Projects v2).
#   • Variable PROJECT_NUMBER – the integer project number printed by the
#     project-setup.yml workflow (Settings → Variables → Actions).

on:
  issues:
    types: [opened, closed, assigned]
  pull_request:
    types: [opened, ready_for_review, closed]

permissions:
  contents: read

jobs:
  update-project:
    runs-on: ubuntu-latest
    # Skip when PROJECT_NUMBER is not configured yet.
    if: vars.PROJECT_NUMBER != ''
    env:
      GH_TOKEN: ${{ secrets.PROJECTS_PAT }}
      REPO_OWNER: ln-one

    steps:
      - name: Resolve content node ID
        id: content
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "node_id=${{ github.event.issue.node_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "node_id=${{ github.event.pull_request.node_id }}" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------
      # Fetch the project ID and the Status field + option IDs.
      # We try user first, then org, to support both account types.
      # ------------------------------------------------------------------
      - name: Fetch project metadata
        id: project
        run: |
          PROJECT_NUMBER="${{ vars.PROJECT_NUMBER }}"

          # Try user account first (-F passes the value as a JSON integer)
          DATA=$(gh api graphql \
            -f query='query($owner: String!, $num: Int!) {
              user(login: $owner) {
                projectV2(number: $num) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id name options { id name }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="$REPO_OWNER" -F num="$PROJECT_NUMBER" 2>/dev/null || true)

          PROJECT_ID=$(echo "$DATA" | jq -r '.data.user.projectV2.id // empty')

          # Fallback: organization account
          if [ -z "$PROJECT_ID" ]; then
            DATA=$(gh api graphql \
              -f query='query($owner: String!, $num: Int!) {
                organization(login: $owner) {
                  projectV2(number: $num) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name options { id name }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$REPO_OWNER" -F num="$PROJECT_NUMBER")
            PROJECT_ID=$(echo "$DATA" | jq -r '.data.organization.projectV2.id')
            STATUS_FIELD_ID=$(echo "$DATA" | jq -r \
              '.data.organization.projectV2.fields.nodes[] | select(.name == "Status") | .id')
            OPTIONS=$(echo "$DATA" | jq -c \
              '.data.organization.projectV2.fields.nodes[] | select(.name == "Status") | .options')
          else
            STATUS_FIELD_ID=$(echo "$DATA" | jq -r \
              '.data.user.projectV2.fields.nodes[] | select(.name == "Status") | .id')
            OPTIONS=$(echo "$DATA" | jq -c \
              '.data.user.projectV2.fields.nodes[] | select(.name == "Status") | .options')
          fi

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "status_field_id=$STATUS_FIELD_ID" >> "$GITHUB_OUTPUT"
          # Persist options as compact JSON for the next step
          printf 'status_options=%s\n' "$OPTIONS" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Add the issue / PR to the project (idempotent – adding an item
      # that already exists simply returns the existing item ID).
      # ------------------------------------------------------------------
      - name: Add item to project
        id: add_item
        run: |
          ITEM_ID=$(gh api graphql -f query='
            mutation($projectId: ID!, $contentId: ID!) {
              addProjectV2ItemByNodeId(input: {
                projectId: $projectId
                contentId: $contentId
              }) { item { id } }
            }
          ' -f projectId="${{ steps.project.outputs.project_id }}" \
            -f contentId="${{ steps.content.outputs.node_id }}" \
            --jq '.data.addProjectV2ItemByNodeId.item.id')
          echo "item_id=$ITEM_ID" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Determine the target Status value and update the field.
      # ------------------------------------------------------------------
      - name: Update Status field
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          # Map event → Status name
          if   [ "$EVENT" = "issues" ]       && [ "$ACTION" = "opened" ];          then STATUS="Backlog"
          elif [ "$EVENT" = "issues" ]       && [ "$ACTION" = "assigned" ];        then STATUS="Ready"
          elif [ "$EVENT" = "issues" ]       && [ "$ACTION" = "closed" ];          then STATUS="Done"
          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "opened" ];          then STATUS="Backlog"
          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "ready_for_review" ]; then STATUS="In review"
          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then STATUS="Done"
          else
            echo "No Status update needed for event=$EVENT action=$ACTION – skipping."
            exit 0
          fi

          # Look up the option ID for $STATUS from the cached JSON
          OPTION_ID=$(echo '${{ steps.project.outputs.status_options }}' | \
            jq -r --arg name "$STATUS" '.[] | select(.name == $name) | .id')

          if [ -z "$OPTION_ID" ]; then
            echo "Could not find option ID for Status='$STATUS'. Skipping update."
            exit 0
          fi

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }
          ' -f projectId="${{ steps.project.outputs.project_id }}" \
            -f itemId="${{ steps.add_item.outputs.item_id }}" \
            -f fieldId="${{ steps.project.outputs.status_field_id }}" \
            -f optionId="$OPTION_ID"

          echo "✅ Status set to '$STATUS'"
