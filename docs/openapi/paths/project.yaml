/api/v1/projects:
  post:
    summary: 创建项目
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project.yaml#/ProjectRequest'
    responses:
      '200':
        description: 项目创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/ProjectResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

  get:
    summary: 获取项目列表
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/LimitParam'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/GetProjectsResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/projects/{project_id}:
  get:
    summary: 获取项目详情
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/ProjectResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

  put:
    summary: 修改项目信息
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project.yaml#/ProjectRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/ProjectResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

  delete:
    summary: 删除项目
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/projects/{project_id}/files:
  get:
    summary: 获取项目的上传文件列表
    tags: [Project, Files]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/LimitParam'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/GetFilesResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/projects/{project_id}/statistics:
  get:
    summary: 获取项目统计信息
    description: 获取项目的文件数、对话数、生成任务数等统计信息
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/ProjectStatisticsResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/projects/search:
  get:
    summary: 搜索项目
    description: 根据关键词搜索项目
    tags: [Project]
    security:
      - BearerAuth: []
    parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
        description: 搜索关键词
      - name: status
        in: query
        schema:
          type: string
          enum: [draft, in_progress, completed]
        description: 按状态筛选
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/LimitParam'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project.yaml#/GetProjectsResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
