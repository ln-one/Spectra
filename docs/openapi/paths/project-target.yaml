/api/v1/projects:
  post:
    summary: 创建项目（支持引用式创建）
    operationId: postProjects
    tags: [Project]
    security:
      - SessionAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project-target.yaml#/ProjectRequestTarget'
    responses:
      '200':
        description: 项目创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-target.yaml#/ProjectResponseTarget'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

  get:
    summary: 获取项目列表
    operationId: getProjects
    tags: [Project]
    security:
      - SessionAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/LimitParam'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-target.yaml#/GetProjectsResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/projects/{project_id}:
  get:
    summary: 获取项目详情
    operationId: getProjectsByProjectId
    tags: [Project]
    security:
      - SessionAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-target.yaml#/ProjectResponseTarget'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

  put:
    summary: 修改项目信息（可扩展可见性与引用权限）
    operationId: putProjectsByProjectId
    tags: [Project]
    security:
      - SessionAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/project-target.yaml#/ProjectRequestTarget'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/project-target.yaml#/ProjectResponseTarget'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

  delete:
    summary: 删除项目
    operationId: deleteProjectsByProjectId
    tags: [Project]
    security:
      - SessionAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
