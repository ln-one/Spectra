services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - DEFAULT_MODEL=qwen3.5-plus
      - LARGE_MODEL=qwen3.5-plus
      - SMALL_MODEL=qwen3.5-plus
      - AI_REQUEST_TIMEOUT_SECONDS=45
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - DB_REQUIRED=true
      - REDIS_REQUIRED=false
    command: sh -c "prisma migrate deploy && prisma generate && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - DEFAULT_MODEL=qwen3.5-plus
      - LARGE_MODEL=qwen3.5-plus
      - SMALL_MODEL=qwen3.5-plus
      - AI_REQUEST_TIMEOUT_SECONDS=45
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - WORKER_NAME=worker-1
      - WORKER_RECOVERY_SCAN=true
    command: sh -c "prisma migrate deploy && prisma generate && python worker.py"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:0.5.2
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  runtime_data:
