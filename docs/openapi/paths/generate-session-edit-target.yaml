/api/v1/generate/sessions/{session_id}/commands:
  post:
    summary: 执行会话命令（唯一写入口）
    operationId: postGenerateSessionsBySessionIdCommands
    description: |
      所有会引起状态变化或内容变化的操作统一通过 Command 接口执行。
      目标契约中补充支持会话手动改名，以及带明确需求的单页局部修改。
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionCommandRequestTarget'
    responses:
      '200':
        description: 命令已执行或接受
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/GenerationSessionCommandResponseTarget'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

/api/v1/generate/sessions/{session_id}/slides/{slide_id}/regenerate:
  post:
    summary: 提交单页局部修改
    operationId: postGenerateSessionsBySessionIdSlidesBySlideIdRegenerate
    description: |
      兼容别名，等价于 command_type=REGENERATE_SLIDE。
      目标契约中，这个能力的产品语义是“按用户明确需求只修改当前页”，而不是无条件重绘。
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: slide_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate-session-requests-target.yaml#/LocalModifySlideRequestTarget'
    responses:
      '200':
        description: 单页局部修改已接受
        content:
          application/json:
            schema:
              $ref: '../schemas/generate-session-requests-target.yaml#/LocalModifySlideResponseTarget'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'
