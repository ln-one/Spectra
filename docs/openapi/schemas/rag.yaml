RAGSearchRequest:
  type: object
  required: [project_id, query]
  properties:
    project_id:
      type: string
    query:
      type: string
      minLength: 1
      maxLength: 1000
    top_k:
      type: integer
      default: 5
      minimum: 1
      maximum: 20
    filters:
      type: object
      properties:
        file_types:
          type: array
          items:
            type: string
            enum: [pdf, word, video, image, ppt]
        file_ids:
          type: array
          items:
            type: string

RAGSearchResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/RAGResult'
        total:
          type: integer
    message:
      type: string

RAGResult:
  type: object
  required: [chunk_id, content, score, source]
  properties:
    chunk_id:
      type: string
    content:
      type: string
    score:
      type: number
      format: float
    source:
      $ref: './common.yaml#/SourceReference'
    metadata:
      type: object

SourceDetailResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        chunk_id:
          type: string
        content:
          type: string
        source:
          $ref: './common.yaml#/SourceReference'
        context:
          type: object
          properties:
            previous_chunk:
              type: string
            next_chunk:
              type: string
        file_info:
          $ref: './files.yaml#/UploadedFile'
    message:
      type: string

WebKnowledgeUnit:
  type: object
  required: [chunk_id, source_type, content, metadata]
  properties:
    chunk_id:
      type: string
    source_type:
      type: string
      enum: [web, audio, video]
    content:
      type: string
    metadata:
      type: object
      additionalProperties: true
    citation:
      allOf:
        - $ref: './common.yaml#/SourceReference'

WebSearchResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/WebKnowledgeUnit'
        total:
          type: integer
        indexed:
          type: integer
          nullable: true
    message:
      type: string

AudioTranscribeResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        audio_id:
          type: string
        text:
          type: string
        segments:
          type: array
          items:
            $ref: '#/WebKnowledgeUnit'
        total_segments:
          type: integer
        indexed:
          type: integer
          nullable: true
        language:
          type: string
        confidence:
          type: number
          format: float
        duration:
          type: number
          format: float
        capability_status:
          $ref: './common.yaml#/CapabilityStatus'
    message:
      type: string

VideoAnalyzeResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        video_id:
          type: string
        segments:
          type: array
          items:
            $ref: '#/WebKnowledgeUnit'
        total_segments:
          type: integer
        indexed:
          type: integer
          nullable: true
        capability_status:
          $ref: './common.yaml#/CapabilityStatus'
    message:
      type: string
