/api/v1/auth/register:
  post:
    summary: 用户注册
    operationId: postAuthRegister
    tags: [Auth]
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RegisterRequest'
    responses:
      '200':
        description: 注册成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

/api/v1/auth/login:
  post:
    summary: 用户登录
    operationId: postAuthLogin
    tags: [Auth]
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/LoginRequest'
    responses:
      '200':
        description: 登录成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/auth/logout:
  post:
    summary: 退出登录
    operationId: postAuthLogout
    tags: [Auth]
    responses:
      '200':
        description: 退出成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/auth/me:
  get:
    summary: 获取当前用户信息
    operationId: getAuthMe
    tags: [Auth]
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/UserInfoResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
