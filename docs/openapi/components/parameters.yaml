IdempotencyKey:
  name: Idempotency-Key
  in: header
  required: false
  schema:
    type: string
    format: uuid
  description: 幂等性密钥，用于防止重复请求。

ContractVersion:
  name: X-Contract-Version
  in: header
  required: false
  schema:
    type: string
    example: '2026-03'
  description: 客户端期望的契约版本；服务端可据此做兼容降级与告警。

PageParam:
  name: page
  in: query
  description: 页码（从1开始）
  schema:
    type: integer
    default: 1
    minimum: 1

LimitParam:
  name: limit
  in: query
  description: 每页数量
  schema:
    type: integer
    default: 20
    minimum: 1
    maximum: 100
