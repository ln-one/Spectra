services:
  dualweave:
    image: ${DUALWEAVE_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - dualweave_data:/var/lib/dualweave/uploads
    environment:
      - DUALWEAVE_ADDR=:8080
      - DUALWEAVE_LOCAL_DIR=/var/lib/dualweave/uploads

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_TIMEOUT_MS=30000
      - NEXT_PUBLIC_CHAT_TIMEOUT_MS=90000
    command: npm run dev
    depends_on:
      - backend

  pagevra:
    image: ${PAGEVRA_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - runtime_data:/var/lib/spectra
    environment:
      - PORT=8090
      - CHROME_PATH=/usr/bin/chromium
      - PAGEVRA_DISTRIBUTION=image
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  ourograph_db_init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: spectra
    command:
      [
        "sh",
        "-c",
        "until pg_isready -h postgres -U spectra -d postgres; do sleep 1; done; psql -h postgres -U spectra -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'ourograph'\" | grep -q 1 || psql -h postgres -U spectra -d postgres -c \"CREATE DATABASE ourograph\"",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  ourograph:
    image: ${OUROGRAPH_IMAGE:?Run python3 ./scripts/compose_smart.py sync --channel develop}
    ports:
      - "127.0.0.1:8101:8101"
    volumes:
      - runtime_data:/var/lib/spectra
    environment:
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/ourograph
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O-",
          "http://127.0.0.1:8101/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      ourograph_db_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - AI_REQUEST_TIMEOUT_SECONDS=90
      - CHAT_RAG_TIMEOUT_SECONDS=5
      - OUTLINE_DRAFT_TIMEOUT_SECONDS=90
      - PREVIEW_REBUILD_TIMEOUT_SECONDS=8
      - TOOL_CHECK_CACHE_TTL_SECONDS=300
      - HEALTH_TOOL_TIMEOUT_SECONDS=2
      - GENERATION_TOOLS_REQUIRED=true
      - RQ_WORKER_HEARTBEAT_FRESHNESS_SECONDS=420
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_MODE=persistent
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - PAGEVRA_BASE_URL=http://pagevra:8090
      - PAGEVRA_TIMEOUT_SECONDS=180
      - OUROGRAPH_BASE_URL=http://ourograph:8101
      - OUROGRAPH_TIMEOUT_SECONDS=30
      - STRUCTRA_BASE_URL=http://pagevra:8090
      - STRUCTRA_TIMEOUT_SECONDS=180
      - RENDER_ENGINE_BASE_URL=http://pagevra:8090
      - RENDER_ENGINE_TIMEOUT_SECONDS=180
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - DUALWEAVE_ENABLED=true
      - DUALWEAVE_BASE_URL=http://dualweave:8080
      - DB_REQUIRED=true
      - REDIS_REQUIRED=false
      - UVICORN_RELOAD=false
    command: sh -c "prisma migrate deploy && prisma generate && if [ \"$${UVICORN_RELOAD:-false}\" = \"true\" ]; then uvicorn main:app --host 0.0.0.0 --port 8000 --reload; else uvicorn main:app --host 0.0.0.0 --port 8000; fi"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
      dualweave:
        condition: service_started
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/venv
      - runtime_data:/var/lib/spectra
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://spectra:spectra@postgres:5432/spectra
      - JWT_SECRET_KEY=spectra-local-dev-jwt-secret
      - AI_REQUEST_TIMEOUT_SECONDS=90
      - CHAT_RAG_TIMEOUT_SECONDS=5
      - OUTLINE_DRAFT_TIMEOUT_SECONDS=90
      - PREVIEW_REBUILD_TIMEOUT_SECONDS=8
      - TOOL_CHECK_CACHE_TTL_SECONDS=300
      - HEALTH_TOOL_TIMEOUT_SECONDS=2
      - GENERATION_TOOLS_REQUIRED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_MODE=persistent
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/var/lib/spectra/chroma
      - UPLOAD_DIR=/var/lib/spectra/uploads
      - ARTIFACT_STORAGE_DIR=/var/lib/spectra/artifacts
      - GENERATED_DIR=/var/lib/spectra/generated
      - PAGEVRA_BASE_URL=http://pagevra:8090
      - PAGEVRA_TIMEOUT_SECONDS=180
      - OUROGRAPH_BASE_URL=http://ourograph:8101
      - OUROGRAPH_TIMEOUT_SECONDS=30
      - STRUCTRA_BASE_URL=http://pagevra:8090
      - STRUCTRA_TIMEOUT_SECONDS=180
      - RENDER_ENGINE_BASE_URL=http://pagevra:8090
      - RENDER_ENGINE_TIMEOUT_SECONDS=180
      - POSTGRES_BACKUP_DIR=/var/lib/spectra/backups
      - POSTGRES_RESTORE_STAGING_DIR=/var/lib/spectra/restore-staging
      - POSTGRES_BACKUP_RETENTION_DAYS=14
      - POSTGRES_BACKUP_PREFIX=spectra-dev
      - DUALWEAVE_ENABLED=true
      - DUALWEAVE_BASE_URL=http://dualweave:8080
      - WORKER_NAME=worker-1
      - WORKER_RECOVERY_SCAN=true
      - RQ_WORKER_HEARTBEAT_FRESHNESS_SECONDS=420
    command: sh -c "prisma migrate deploy && prisma generate && python worker.py"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
      dualweave:
        condition: service_started
      pagevra:
        condition: service_healthy
      ourograph:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:0.5.2
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dualweave_data:
  postgres_data:
  redis_data:
  chroma_data:
  runtime_data:
