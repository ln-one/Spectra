/api/v1/generate/courseware:
  post:
    summary: 生成课件
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate.yaml#/GenerateRequest'
    responses:
      '200':
        description: 生成任务已创建
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/GenerateResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/generate/status/{task_id}:
  get:
    summary: 查询生成状态
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/GenerateStatusResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
