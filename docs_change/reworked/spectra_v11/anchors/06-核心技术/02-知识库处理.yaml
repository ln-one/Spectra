allowed_claims:
  - "当前检索增强包含解析、切块、向量化、召回和证据组织。"
  - "Dualweave 只在上传编排与远端解析入口层面进入当前说明。"
  - "检索质量已有正式评估数据支撑。"
  - "advanced(api)、late_interaction 和 late_interaction_jina 已进入补充比较。"
  - "当前生产默认重排路径是 Dualweave /rerank/text + DashScope qwen3-rerank。"
  - "late_interaction 是补充评估与受控实验路径，不是当前默认生产链。"
  - "Stratumind 当前检索流包含 query rewriting、adaptive planning、dense+sparse hybrid、可选 fusion、可选 rerank 和 evidence packing。"
  - "可以将当前 adaptive planning 能力保守概括为 ARP 这一行文简称，但必须明确其基础是 query feature -> bucket -> profile -> 参数落地。"
  - "可以说明项目正在向课程感知型策略编排演进，但不能写成课程级参数中心已经全面完成。"
  - "首次出现 ARP 时，应同时说明其与 Adaptive-RAG、HyPA-RAG 或 agentic retrieval 等外部路线的关系。"
  - "Qdrant 相关公开教程只用于支撑检索质量评估与调优方法，不替代项目自身证据。"
