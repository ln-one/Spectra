/api/v1/generate/sessions/{session_id}/commands:
  $ref: './generate-session-command.yaml#/~1api~1v1~1generate~1sessions~1{session_id}~1commands'

/api/v1/generate/sessions/{session_id}/outline:
  put:
    summary: 更新大纲并回写会话
    description: 兼容别名，等价于 command_type=UPDATE_OUTLINE
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate.yaml#/UpdateOutlineRequest'
    responses:
      '200':
        description: 大纲更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/UpdateOutlineResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

/api/v1/generate/sessions/{session_id}/confirm:
  post:
    summary: 确认大纲并继续生成
    description: 兼容别名，等价于 command_type=CONFIRM_OUTLINE
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../schemas/generate.yaml#/ConfirmOutlineRequest'
    responses:
      '200':
        description: 已进入内容生成
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/ConfirmOutlineResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

