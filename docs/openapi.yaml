components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 认证令牌
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          example: john_doe
        fullName:
          type: string
          example: John Doe
    UserInfo:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        fullName:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - message
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
              description: 是否建议客户端重试
            details:
              type: object
              description: 结构化错误详情（例如字段错误、状态冲突上下文）
              additionalProperties: true
            trace_id:
              type: string
              description: 服务端追踪 ID，用于日志排障
        message:
          type: string
          description: 根级错误摘要，通常为“请求失败”或业务级失败说明
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    SimpleSuccessResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
          description: 成功响应载荷。部分接口可能返回空对象。
        message:
          type: string
          example: 操作成功
    UserInfoResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserInfo'
        message:
          type: string
    SourceReference:
      type: object
      required:
        - chunk_id
        - source_type
        - filename
      properties:
        chunk_id:
          type: string
          description: 来源片段唯一标识，可用于查询来源详情
        source_type:
          type: string
          enum:
            - video
            - document
            - ai_generated
        filename:
          type: string
        page_number:
          type: integer
        timestamp:
          type: string
        preview_text:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
        - timestamp
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
            - system
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        citations:
          type: array
          description: assistant 回复关联的来源引用（可选，建议尽量返回）
          items:
            $ref: '#/components/schemas/SourceReference'
    GetMessagesResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
              description: 查询时的会话范围（可选）
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
        message:
          type: string
    SendMessageRequest:
      type: object
      required:
        - project_id
        - content
      properties:
        project_id:
          type: string
        session_id:
          type: string
          description: 会话级上下文隔离 ID。提供后按 project_id + session_id 过滤历史与资料。
        content:
          type: string
          minLength: 1
          maxLength: 10000
        history:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    SendMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
              description: 本次回复绑定的会话 ID（可选）
            message:
              $ref: '#/components/schemas/Message'
            suggestions:
              type: array
              items:
                type: string
        message:
          type: string
    CapabilityStatus:
      type: object
      description: 能力执行状态与降级信息（统一字段，适用于解析/视频/语音）
      required:
        - capability
        - provider
        - status
        - fallback_used
      properties:
        capability:
          type: string
          enum:
            - document_parser
            - video_understanding
            - speech_recognition
          description: 能力标识
        provider:
          type: string
          description: 实际执行的 provider（如 MinerU、Qwen-VL、Faster-Whisper、local_parser）
        status:
          type: string
          enum:
            - available
            - degraded
            - unavailable
          description: 能力状态
        fallback_used:
          type: boolean
          description: 是否发生降级
        fallback_target:
          type: string
          description: 降级目标 provider（仅当 fallback_used=true 时有值）
        reason_code:
          type: string
          enum:
            - PROVIDER_TIMEOUT
            - PROVIDER_RATE_LIMITED
            - PROVIDER_UNAVAILABLE
            - INVALID_INPUT_FORMAT
            - UNSUPPORTED_FILE_TYPE
            - EMPTY_OUTPUT
            - INTERNAL_ERROR
          description: 失败或降级原因码
        user_message:
          type: string
          description: 可直接展示给用户的提示语
        trace_id:
          type: string
          description: 链路追踪 ID
    VoiceMessageResponse:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session_id:
              type: string
