/api/v1/auth/register:
  post:
    summary: 用户注册
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RegisterRequest'
    responses:
      '200':
        description: 注册成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '409':
        $ref: '../components/responses.yaml#/Conflict'

/api/v1/auth/login:
  post:
    summary: 用户登录
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/LoginRequest'
    responses:
      '200':
        description: 登录成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/auth/refresh:
  post:
    summary: 刷新 Access Token
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token:
                type: string
                description: 长期有效的刷新令牌
    responses:
      '200':
        description: 刷新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/AuthResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/auth/logout:
  post:
    summary: 退出登录
    tags: [Auth]
    security:
      - BearerAuth: []
    responses:
      '200':
        description: 退出成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SimpleSuccessResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

/api/v1/auth/me:
  get:
    summary: 获取当前用户信息
    tags: [Auth]
    security:
      - BearerAuth: []
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/UserInfoResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
