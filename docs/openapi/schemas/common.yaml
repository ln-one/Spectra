SimpleSuccessResponse:
  type: object
  required: [success, message]
  properties:
    success:
      type: boolean
      example: true
    message:
      type: string
      example: "操作成功"

ErrorResponse:
  type: object
  required: [success, error]
  properties:
    success:
      type: boolean
      example: false
    error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
          description: 是否建议客户端重试
        details:
          type: object
          description: 结构化错误详情（例如字段错误、状态冲突上下文）
          additionalProperties: true
        trace_id:
          type: string
          description: 服务端追踪 ID，用于日志排障
