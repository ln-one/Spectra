/api/v1/chat/messages:
  post:
    summary: 发送消息
    tags: [Chat]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/chat.yaml#/SendMessageRequest'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/chat.yaml#/SendMessageResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

  get:
    summary: 获取对话历史
    tags: [Chat]
    security:
      - BearerAuth: []
    parameters:
      - name: project_id
        in: query
        required: true
        schema:
          type: string
        description: 项目级查询范围（兼容字段）
      - name: session_id
        in: query
        required: false
        schema:
          type: string
        description: 会话级查询范围（推荐）。提供后优先按会话隔离上下文。
      - $ref: '../components/parameters.yaml#/PageParam'
      - $ref: '../components/parameters.yaml#/LimitParam'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/chat.yaml#/GetMessagesResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/chat/voice:
  post:
    summary: 语音消息输入
    description: 上传语音文件，系统将自动识别并转换为文本消息
    tags: [Chat]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [audio, project_id]
            properties:
              audio:
                type: string
                format: binary
                description: 音频文件（支持 wav, mp3, m4a, ogg）
              project_id:
                type: string
                description: 项目 ID
              session_id:
                type: string
                description: 会话 ID（推荐，确保语音输入归属到当前会话）
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/chat.yaml#/VoiceMessageResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
