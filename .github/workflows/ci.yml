name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      # Documentation
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'SECURITY.md'
      - '*.md'
      
      # AI/IDE configuration
      - '.cursorrules'
      - '**/.cursorrules'
      - '.kiro/**'
      - '.ai/**'
      - '.vscode/**'
      
      # Git configuration
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      
      # CI/CD scripts (not the workflows themselves)
      - 'scripts/check-ai-docs.sh'
      
      # Editor/IDE files
      - '.DS_Store'
      - '**/.DS_Store'
      
      # Generated/temporary files
      - 'generated/**'
      - 'uploads/**'
      - 'templates/**'
      - 'backend/temp/**'
      - 'backend/uploads/**'
      - 'backend/generated/**'
      
      # Config files that don't affect code
      - '.nvmrc'
      - '.npmrc'
      - '.dockerignore'
      - '.redocly.yaml'
      
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      # Documentation
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'SECURITY.md'
      - '*.md'
      
      # AI/IDE configuration
      - '.cursorrules'
      - '**/.cursorrules'
      - '.kiro/**'
      - '.ai/**'
      - '.vscode/**'
      
      # Git configuration
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      
      # CI/CD scripts (not the workflows themselves)
      - 'scripts/check-ai-docs.sh'
      
      # Editor/IDE files
      - '.DS_Store'
      - '**/.DS_Store'
      
      # Generated/temporary files
      - 'generated/**'
      - 'uploads/**'
      - 'templates/**'
      - 'backend/temp/**'
      - 'backend/uploads/**'
      - 'backend/generated/**'
      
      # Config files that don't affect code
      - '.nvmrc'
      - '.npmrc'
      - '.dockerignore'
      - '.redocly.yaml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Lint
        working-directory: frontend
        run: npm run lint
      
      - name: Check formatting
        working-directory: frontend
        run: npm run format:check

      - name: Test
        working-directory: frontend
        run: npm test
      
      - name: Build
        working-directory: frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js (for Marp CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli --registry https://registry.npmmirror.com
      
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Setup environment
        working-directory: backend
        run: cp .env.example .env
      
      - name: Generate Prisma client
        working-directory: backend
        env:
          npm_config_registry: https://registry.npmmirror.com
        run: prisma generate
      
      - name: Check code format
        working-directory: backend
        run: black --check .
      
      - name: Check import sorting
        working-directory: backend
        run: isort --check .
      
      - name: Lint
        working-directory: backend
        run: flake8 . --max-line-length=88 --extend-ignore=E203

      - name: Test
        working-directory: backend
        run: pytest -m "not integration"
