PreviewResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 会话级预览上下文 ID（session-first 流程）
        task_id:
          type: string
          description: 兼容旧任务流的执行 ID
          nullable: true
        artifact_id:
          type: string
          description: 当前预览对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 当前预览基于的正式版本 ID
          nullable: true
        render_version:
          type: integer
          minimum: 1
          description: 当前可预览渲染版本
        slides:
          type: array
          items:
            $ref: '#/Slide'
        lesson_plan:
          $ref: '#/LessonPlan'
    message:
      type: string

Slide:
  type: object
  required: [id, index, title, content, sources]
  properties:
    id:
      type: string
    index:
      type: integer
      minimum: 0
    title:
      type: string
    content:
      type: string
    sources:
      type: array
      items:
        $ref: '#/SourceReference'
    thumbnail_url:
      type: string

SourceReference:
  type: object
  required: [chunk_id, source_type, filename]
  properties:
    chunk_id:
      type: string
      description: 来源片段唯一标识，可用于查询来源详情
    source_type:
      type: string
      enum: [video, document, ai_generated]
    filename:
      type: string
    page_number:
      type: integer
    timestamp:
      type: string
    preview_text:
      type: string

LessonPlan:
  type: object
  properties:
    teaching_objectives:
      type: array
      items:
        type: string
    slides_plan:
      type: array
      items:
        $ref: '#/SlidePlan'

SlidePlan:
  type: object
  required: [slide_id, teaching_goal, teacher_script]
  properties:
    slide_id:
      type: string
    teaching_goal:
      type: string
    teacher_script:
      type: string
    teaching_suggestions:
      type: array
      items:
        type: string
    suggested_duration:
      type: integer
      minimum: 1
      maximum: 180
    material_sources:
      type: array
      items:
        $ref: '#/SourceReference'

ModifyRequest:
  type: object
  required: [instruction]
  properties:
    session_id:
      type: string
      description: 兼容字段。仅在 task 路由下用于显式绑定会话。
    instruction:
      type: string
      minLength: 1
      maxLength: 2000
    target_slides:
      type: array
      items:
        type: string
    context:
      type: object
    base_render_version:
      type: integer
      minimum: 1
      description: 并发控制版本（防止覆盖更新）

ModifySessionRequest:
  type: object
  required: [instruction]
  properties:
    artifact_id:
      type: string
      description: 指定要修改的成果 ID（可选）
    instruction:
      type: string
      minLength: 1
      maxLength: 2000
    target_slides:
      type: array
      items:
        type: string
    context:
      type: object
    base_render_version:
      type: integer
      minimum: 1
      description: 并发控制版本（防止覆盖更新）

ModifyResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 修改任务实际作用的会话
        modify_task_id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        render_version:
          type: integer
          minimum: 1
          description: 修改后最新渲染版本
        artifact_id:
          type: string
          description: 修改任务对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 修改任务基于的正式版本 ID
          nullable: true
    message:
      type: string

SlideDetailResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 当前幻灯片详情所属会话
        slide:
          $ref: '#/Slide'
        teaching_plan:
          $ref: '#/SlidePlan'
          description: 该幻灯片对应的教学计划
        related_slides:
          type: array
          items:
            type: object
            properties:
              slide_id:
                type: string
              title:
                type: string
              relation:
                type: string
                enum: [previous, next, related]
          description: 相关幻灯片
    message:
      type: string

ExportRequest:
  type: object
  required: [format]
  properties:
    artifact_id:
      type: string
      description: 指定要导出的成果 ID（可选）
    format:
      type: string
      enum: [json, markdown, html]
      description: 导出格式
    include_sources:
      type: boolean
      default: true
      description: 是否包含来源信息
    expected_render_version:
      type: integer
      minimum: 1
      description: |
        可选并发保护版本，仅对 session 级导出接口生效（冲突可返回 409）。

ExportResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 导出时绑定的会话 ID
        task_id:
          type: string
          description: 兼容旧任务执行 ID
          nullable: true
        artifact_id:
          type: string
          description: 导出对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 导出基于的正式版本 ID
          nullable: true
        content:
          type: string
          description: 导出的内容
        format:
          type: string
        render_version:
          type: integer
          minimum: 1
    message:
      type: string
