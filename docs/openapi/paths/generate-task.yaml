/api/v1/generate/courseware:
  post:
    summary: 生成课件（兼容入口）
    description: |
      兼容旧版的一次性创建接口。新流程推荐使用 /generate/sessions 系列接口，
      支持阶段式中断、事件流推送与局部重绘。
      已弃用，预计 2026-06-30 后移除。
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/IdempotencyKey'
      - $ref: '../components/parameters.yaml#/ContractVersion'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/generate.yaml#/GenerateRequest'
    responses:
      '200':
        description: 生成任务已创建
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/GenerateResponse'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/generate/tasks/{task_id}/status:
  get:
    summary: 查询生成状态
    description: |
      已弃用，建议迁移到 /api/v1/generate/sessions/{session_id}。
      预计 2026-06-30 后移除。
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/GenerateStatusResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/generate/tasks/{task_id}/download:
  get:
    summary: 下载生成的课件文件
    description: |
      已弃用，建议迁移到 /api/v1/generate/sessions/{session_id}/preview/export。
      预计 2026-06-30 后移除。
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      - name: file_type
        in: query
        required: true
        schema:
          type: string
          enum: [ppt, word]
        description: 要下载的文件类型
    responses:
      '200':
        description: 文件下载成功
        content:
          application/vnd.openxmlformats-officedocument.presentationml.presentation:
            schema:
              type: string
              format: binary
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema:
              type: string
              format: binary
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

/api/v1/generate/tasks/{task_id}/versions:
  get:
    summary: 获取任务的所有版本
    description: |
      已弃用，建议迁移到 /api/v1/generate/sessions/{session_id}。
      预计 2026-06-30 后移除。
    deprecated: true
    tags: [Generate]
    security:
      - BearerAuth: []
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas/generate.yaml#/VersionsResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
