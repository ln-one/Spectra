PreviewResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 会话级预览上下文 ID（session-first）
        artifact_id:
          type: string
          description: 当前预览对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 当前预览基于的正式版本 ID
          nullable: true
        current_version_id:
          type: string
          description: 当前项目正式版本 ID
          nullable: true
        upstream_updated:
          type: boolean
          description: 预览基于的上游版本是否与当前项目版本一致
        render_version:
          type: integer
          minimum: 1
          description: 当前可预览渲染版本
        artifact_anchor:
          $ref: "#/ArtifactAnchor"
        rendered_preview:
          $ref: '#/RenderedPreview'
        diego_preview_context:
          $ref: '#/DiegoPreviewContext'
        authority_preview:
          $ref: '#/AuthorityPreview'
        slides:
          type: array
          items:
            $ref: '#/Slide'
        lesson_plan:
          $ref: '#/LessonPlan'
    message:
      type: string

Slide:
  type: object
  required: [id, index, title, content, sources]
  properties:
    id:
      type: string
    index:
      type: integer
      minimum: 0
    title:
      type: string
    content:
      type: string
    sources:
      type: array
      items:
        $ref: '#/SourceReference'
    thumbnail_url:
      type: string
    rendered_html_preview:
      type: string
      nullable: true
    rendered_previews:
      type: array
      items:
        $ref: '#/RenderedPreviewPage'
    image_metadata:
      $ref: '#/ImageInsertionMetadata'

RenderedPreviewPage:
  type: object
  required: [index, slide_id]
  properties:
    index:
      type: integer
      minimum: 0
    slide_id:
      type: string
    image_url:
      type: string
      nullable: true
    format:
      type: string
      nullable: true
    svg_data_url:
      type: string
      nullable: true
    preview:
      $ref: '#/SvgPreviewManifest'
    html_preview:
      type: string
      nullable: true
    status:
      type: string
      nullable: true
    split_index:
      type: integer
      minimum: 0
      default: 0
    split_count:
      type: integer
      minimum: 1
      default: 1
    width:
      type: integer
      minimum: 1
      nullable: true
    height:
      type: integer
      minimum: 1
      nullable: true

RenderedPreview:
  type: object
  properties:
    format:
      type: string
      default: png
    page_count:
      type: integer
      minimum: 0
      default: 0
    pages:
      type: array
      items:
        $ref: '#/RenderedPreviewPage'

DiegoPreviewContext:
  type: object
  properties:
    provider:
      type: string
      enum: [diego]
      default: diego
    run_id:
      type: string
    palette:
      type: string
    style:
      type: string
    style_dna_id:
      type: string
    effective_template_style:
      type: string
    source_event_seq:
      type: integer
      minimum: 1
    theme:
      type: object
      properties:
        primary:
          type: string
        secondary:
          type: string
        accent:
          type: string
        light:
          type: string
        bg:
          type: string
    fonts:
      type: object
      properties:
        title:
          type: string
        body:
          type: string

SvgPreviewManifest:
  type: object
  required: [index, slide_id, format, svg_data_url]
  properties:
    index:
      type: integer
      minimum: 0
    slide_id:
      type: string
    format:
      type: string
      enum: [svg]
      default: svg
    svg_data_url:
      type: string
    width:
      type: integer
      minimum: 1
      nullable: true
    height:
      type: integer
      minimum: 1
      nullable: true

AuthorityPreviewFrame:
  type: object
  required: [slide_id, index, split_index, split_count]
  properties:
    slide_id:
      type: string
    index:
      type: integer
      minimum: 0
    split_index:
      type: integer
      minimum: 0
      default: 0
    split_count:
      type: integer
      minimum: 1
      default: 1
    status:
      type: string
      nullable: true
    format:
      type: string
      nullable: true
    svg_data_url:
      type: string
      nullable: true
    preview:
      $ref: '#/SvgPreviewManifest'
    width:
      type: integer
      minimum: 1
      nullable: true
    height:
      type: integer
      minimum: 1
      nullable: true

AuthorityPreviewBlock:
  type: object
  required: [block_id, kind]
  properties:
    block_id:
      type: string
    kind:
      type: string
      enum: [heading, paragraph, bullet_list, image]
    text:
      type: string
    items:
      type: array
      items:
        type: string
    src:
      type: string
    alt:
      type: string

AuthorityPreviewSlide:
  type: object
  required: [slide_id, index, frames]
  properties:
    slide_id:
      type: string
    index:
      type: integer
      minimum: 0
    title:
      type: string
    status:
      type: string
    layout_kind:
      type: string
    render_version:
      type: integer
      minimum: 1
      nullable: true
    format:
      type: string
      nullable: true
    svg_data_url:
      type: string
      nullable: true
    preview:
      $ref: '#/SvgPreviewManifest'
    width:
      type: integer
      minimum: 1
      nullable: true
    height:
      type: integer
      minimum: 1
      nullable: true
    frames:
      type: array
      items:
        $ref: '#/AuthorityPreviewFrame'
    editable_block_ids:
      type: array
      items:
        type: string
    blocks:
      type: array
      items:
        $ref: '#/AuthorityPreviewBlock'

AuthorityPreview:
  type: object
  required: [provider, slides]
  properties:
    provider:
      type: string
      enum: [pagevra, diego]
      default: pagevra
    run_id:
      type: string
      nullable: true
    render_version:
      type: integer
      minimum: 1
      nullable: true
    viewport:
      type: object
      properties:
        width:
          type: integer
          minimum: 1
          nullable: true
        height:
          type: integer
          minimum: 1
          nullable: true
    compile_context_version:
      type: integer
      minimum: 1
      nullable: true
    compile_context:
      $ref: '#/DiegoPreviewContext'
    theme:
      type: object
      properties:
        primary:
          type: string
        secondary:
          type: string
        accent:
          type: string
        light:
          type: string
        bg:
          type: string
    fonts:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
    slides:
      type: array
      items:
        $ref: '#/AuthorityPreviewSlide'

ImageInsertionMetadata:
  type: object
  description: 插图决策元数据
  properties:
    retrieval_mode:
      type: string
      enum: [default_library, strict_sources]
      description: 检索模式
    page_semantic_type:
      type: string
      description: 页面语义类型
    image_insertion_decision:
      type: string
      enum: [insert, skip]
      description: 插图决策
    image_count:
      type: integer
      minimum: 0
      description: 插图数量
    image_slot:
      type: string
      enum: [left_split, right_split, bottom_panel]
      description: 图位
    layout_risk_level:
      type: string
      enum: [low, medium, high]
      description: 版式风险等级
    image_match_reason:
      type: string
      description: 插图匹配原因
    skip_reason:
      type: string
      description: 跳过插图原因

SourceReference:
  type: object
  required: [chunk_id, source_type, filename]
  properties:
    chunk_id:
      type: string
      description: 来源片段唯一标识，可用于查询来源详情
    source_type:
      type: string
      enum: [video, document, ai_generated]
    filename:
      type: string
    page_number:
      type: integer
    timestamp:
      type: string
    preview_text:
      type: string

LessonPlan:
  type: object
  properties:
    teaching_objectives:
      type: array
      items:
        type: string
    slides_plan:
      type: array
      items:
        $ref: '#/SlidePlan'

SlidePlan:
  type: object
  required: [slide_id, teaching_goal, teacher_script]
  properties:
    slide_id:
      type: string
    teaching_goal:
      type: string
    teacher_script:
      type: string
    teaching_suggestions:
      type: array
      items:
        type: string
    suggested_duration:
      type: integer
      minimum: 1
      maximum: 180
    material_sources:
      type: array
      items:
        $ref: '#/SourceReference'

ModifyRequest:
  type: object
  required: [instruction]
  properties:
    session_id:
      type: string
      description: 兼容字段，仅在 task 路由下用于显式绑定会话
    instruction:
      type: string
      minLength: 1
      maxLength: 2000
    target_slides:
      type: array
      items:
        type: string
    context:
      type: object
      additionalProperties: true
    base_render_version:
      type: integer
      minimum: 1
      description: 并发控制版本（防止覆盖更新）

ModifySessionRequest:
  type: object
  required: [instruction]
  description: 单页 prompt 重做请求。精确文本/图片编辑改走 scene/save 接口。
  properties:
    artifact_id:
      type: string
      description: 指定要修改的成果 ID（可选）
    run_id:
      type: string
      description: 指定运行 ID（可选）
    instruction:
      type: string
      minLength: 1
      maxLength: 2000
    target_slides:
      type: array
      items:
        type: string
    context:
      type: object
      additionalProperties: true
    base_render_version:
      type: integer
      minimum: 1
      description: 并发控制版本（防止覆盖更新）
    slide_id:
      type: string
      description: 指定要修改的 slide ID（可选）
    slide_index:
      type: integer
      minimum: 1
      description: 指定要修改的页码（从 1 开始）
    scope:
      type: string
      description: 修改作用范围
    preserve_style:
      type: boolean
      default: true
    preserve_layout:
      type: boolean
      default: true
    preserve_deck_consistency:
      type: boolean
      default: true
    candidate_change:
      $ref: "./project-space.yaml#/CandidateChangeRequest"

ModifyResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 修改任务实际作用的会话
        status:
          type: string
          enum: [pending, processing, completed, failed]
        render_version:
          type: integer
          minimum: 1
          description: 修改后最新渲染版本
        artifact_id:
          type: string
          description: 修改任务对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 修改任务基于的正式版本 ID
          nullable: true
        current_version_id:
          type: string
          description: 当前项目正式版本 ID
          nullable: true
        upstream_updated:
          type: boolean
          description: 修改基于的上游版本是否与当前项目版本一致
        artifact_anchor:
          $ref: "#/ArtifactAnchor"
        slide_id:
          type: string
        slide_index:
          type: integer
          minimum: 1
        scope:
          type: string
        candidate_change:
          $ref: "./project-space.yaml#/CandidateChange"
    message:
      type: string

SlideDetailResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 当前幻灯片详情所属会话
        artifact_id:
          type: string
          description: 当前预览对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 当前预览基于的正式版本 ID
          nullable: true
        current_version_id:
          type: string
          description: 当前项目正式版本 ID
          nullable: true
        upstream_updated:
          type: boolean
          description: 预览基于的上游版本是否与当前项目版本一致
        slide:
          $ref: '#/Slide'
        teaching_plan:
          $ref: '#/SlidePlan'
          description: 该幻灯片对应的教学计划
        artifact_anchor:
          $ref: "#/ArtifactAnchor"
        related_slides:
          type: array
          items:
            type: object
            properties:
              slide_id:
                type: string
              title:
                type: string
              relation:
                type: string
                enum: [previous, next, related]
          description: 相关幻灯片
    message:
      type: string

ExportRequest:
  type: object
  required: [format]
  properties:
    artifact_id:
      type: string
      description: 指定要导出的成果 ID（可选）
    run_id:
      type: string
      description: 指定运行 ID（可选）
    format:
      type: string
      enum: [json, markdown, html]
      description: 导出格式
    include_sources:
      type: boolean
      default: true
      description: 是否包含来源信息
    expected_render_version:
      type: integer
      minimum: 1
      description: |
        可选并发保护版本，仅对 session 级导出接口生效（冲突可返回 409）。
    candidate_change:
      $ref: "./project-space.yaml#/CandidateChangeRequest"

ExportResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        session_id:
          type: string
          description: 导出时绑定的会话 ID
        artifact_id:
          type: string
          description: 导出对应的成果 ID
          nullable: true
        based_on_version_id:
          type: string
          description: 导出基于的正式版本 ID
          nullable: true
        current_version_id:
          type: string
          description: 当前项目正式版本 ID
          nullable: true
        upstream_updated:
          type: boolean
          description: 导出基于的上游版本是否与当前项目版本一致
        artifact_anchor:
          $ref: "#/ArtifactAnchor"
        content:
          type: string
          description: 导出的内容
        format:
          type: string
        render_version:
          type: integer
          minimum: 1
        candidate_change:
          $ref: "./project-space.yaml#/CandidateChange"
    message:
      type: string

ArtifactAnchor:
  type: object
  properties:
    session_id:
      type: string
      nullable: true
    artifact_id:
      type: string
      nullable: true
    based_on_version_id:
      type: string
      nullable: true
    run_id:
      type: string
      nullable: true
