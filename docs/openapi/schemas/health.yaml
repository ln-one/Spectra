CapabilitiesHealthResponse:
  type: object
  required: [success, data, message]
  properties:
    success:
      type: boolean
    data:
      type: object
      properties:
        document_parser:
          $ref: './common.yaml#/CapabilityStatus'
        video_understanding:
          $ref: './common.yaml#/CapabilityStatus'
        speech_recognition:
          $ref: './common.yaml#/CapabilityStatus'
    message:
      type: string

HealthCheckResponse:
  type: object
  required: [status, database, redis, db_required, redis_required]
  properties:
    status:
      type: string
      enum: [healthy, degraded]
    database:
      type: string
      enum: [connected, disconnected]
    redis:
      type: string
      enum: [connected, disconnected]
    db_required:
      type: boolean
    redis_required:
      type: boolean
