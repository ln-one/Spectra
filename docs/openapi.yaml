              type: string
            versions:
              type: array
              items:
                type: object
                properties:
                  version:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum:
                      - completed
                      - failed
                  file_urls:
                    type: object
                    properties:
                      ppt_url:
                        type: string
                      word_url:
                        type: string
                  modification_note:
                    type: string
                    description: 修改说明
